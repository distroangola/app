// ================================================================
// [ADMIN] 33. RENDER: MENSAGENS - Historico de mensagens enviadas (APENAS ADMIN)
// Mostra todas as mensagens que o admin ja enviou aos artistas.
// Mensagens sao unilaterais (notificacoes) — sem campo de resposta.
// Se o utilizador nao for admin, redireciona para o dashboard.
// Suporta paginacao com cursores Firestore e exportacao CSV/PDF.
// ================================================================
// [ADMIN] Renderizar vista de mensagens (apenas admin)
async function renderMessages(container) {
    // Seguranca: apenas admin pode aceder a esta tela
    if (!isAdmin) { currentView = "dashboard"; render(); return; }

    // Constantes de paginacao
    const ITEMS_PER_PAGE = 20;

    // Estado de paginacao (closure-local)
    let currentPage = 1;
    let pageCursors = [null]; // cursores: indice 0 = pagina 1 (null), indice i = cursor para pagina i+1
    let currentMessages = []; // mensagens da pagina atual
    let hasNextPage = false;
    let isLoadingPage = false;

    // Lista completa filtrada (para exportacao, carregada sob demanda)
    let exportFilteredCache = null;

    let msgHtml = '<div style="max-width:700px;margin:1rem auto;" class="animate-in"><div class="glass-card">' +
        '<button id="backMsgs" class="btn-outline back-button">&#8592; Voltar (HOME)</button>' +
        '<div class="msg-header-row">' +
            '<h2 style="margin:0;">&#128233; Historico de Mensagens</h2>' +
        '</div>' +
        '<p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:0.8rem;">Todas as mensagens enviadas aos artistas da plataforma</p>';

    // Botoes de exportacao
    msgHtml += '<div class="export-bar">' +
        '<button id="btnExportCSV" class="btn-export csv">&#128196; Exportar CSV</button>' +
        '<button id="btnExportPDF" class="btn-export pdf">&#128196; Exportar PDF</button>' +
    '</div>';

    // Barra de pesquisa e filtros
    msgHtml += '<div class="msg-filter-bar">' +
        '<input id="adminMsgHistSearch" placeholder="Pesquisar por destinatario, assunto..." style="max-width:260px;">' +
        '<select id="adminMsgHistType" style="max-width:140px;">' +
            '<option value="">Todos os tipos</option>' +
            '<option value="info">Informacao</option>' +
            '<option value="warning">Aviso</option>' +
            '<option value="alert">Alerta</option>' +
            '<option value="financial">Financeiro</option>' +
        '</select>' +
        '<select id="adminMsgHistReadStatus" class="status-filter" style="max-width:140px;">' +
            '<option value="">Todas</option>' +
            '<option value="read">Lidas</option>' +
            '<option value="unread">Nao lidas</option>' +
        '</select>' +
        '<span class="msg-count" id="adminMsgHistCount"></span>' +
    '</div>';

    msgHtml += '<div id="adminMsgHistList" style="max-height:60vh;overflow-y:auto;">' +
        '<div class="info-box blue">Carregando historico...</div>' +
    '</div>';

    // Controles de paginacao
    msgHtml += '<div class="pagination-bar" id="adminMsgPagination">' +
        '<button id="btnPrevPage" disabled>&#8592; Anterior</button>' +
        '<span class="page-indicator" id="pageIndicator">Pagina 1</span>' +
        '<button id="btnNextPage" disabled>Proxima &#8594;</button>' +
    '</div>';

    msgHtml += '</div></div>';
    container.innerHTML = msgHtml;

    document.getElementById("backMsgs")?.addEventListener("click", goBack);

    // Referencias DOM
    const listDiv = document.getElementById("adminMsgHistList");
    const searchInput = document.getElementById("adminMsgHistSearch");
    const filterTypeEl = document.getElementById("adminMsgHistType");
    const filterReadStatusEl = document.getElementById("adminMsgHistReadStatus");
    const countEl = document.getElementById("adminMsgHistCount");
    const btnPrev = document.getElementById("btnPrevPage");
    const btnNext = document.getElementById("btnNextPage");
    const pageIndicatorEl = document.getElementById("pageIndicator");
    const paginationBar = document.getElementById("adminMsgPagination");

    /**
     * Formata o badge de status de leitura para uma mensagem.
     */
    function formatReadBadge(m) {
        if (m.read) {
            return '<span class="read-status read">&#9989; Lida</span>';
        } else {
            return '<span class="read-status unread">&#9203; Nao lida</span>';
        }
    }

    /**
     * Carrega uma pagina de mensagens do Firestore.
     * Atualiza currentMessages, hasNextPage e pageCursors.
     * @param {number} page - Numero da pagina a carregar
     */
    async function loadPage(page) {
        if (isLoadingPage) return;
        isLoadingPage = true;
        listDiv.innerHTML = '<div class="info-box blue" style="text-align:center;padding:2rem;">Carregando mensagens...</div>';
        try {
            const cursor = pageCursors[page - 1] !== undefined ? pageCursors[page - 1] : null;
            const result = await loadAllMessagesForAdmin(ITEMS_PER_PAGE, cursor);
            currentMessages = result.messages;
            hasNextPage = result.hasMore;
            // Guardar cursor para a proxima pagina
            if (result.lastDoc && !pageCursors[page]) {
                pageCursors[page] = result.lastDoc;
            }
            currentPage = page;
            // Atualizar adminMessagesList com as mensagens desta pagina (para showAdminMessageDetail)
            adminMessagesList = currentMessages;
        } catch (e) {
            console.warn("Erro ao carregar pagina:", e);
            currentMessages = [];
            hasNextPage = false;
        }
        isLoadingPage = false;
    }

    /**
     * Obtem as mensagens filtradas para a pagina atual.
     * Como o Firestore faz paginacao server-side sem filtros de texto,
     * os filtros de texto/tipo/status sao aplicados client-side sobre a pagina atual.
     * Para exportacao, e carregado o conjunto completo.
     */
    function getFilteredCurrentPage() {
        const searchQ = (searchInput?.value || '').toLowerCase();
        const typeFilter = filterTypeEl?.value || '';
        const readStatusFilter = filterReadStatusEl?.value || '';

        let filtered = [...currentMessages];

        if (typeFilter) {
            filtered = filtered.filter(m => m.type === typeFilter);
        }
        if (readStatusFilter === 'read') {
            filtered = filtered.filter(m => m.read === true);
        } else if (readStatusFilter === 'unread') {
            filtered = filtered.filter(m => m.read !== true);
        }
        if (searchQ) {
            filtered = filtered.filter(m =>
                (m.userName || '').toLowerCase().includes(searchQ) ||
                (m.userEmail || '').toLowerCase().includes(searchQ) ||
                (m.title || '').toLowerCase().includes(searchQ) ||
                (m.message || '').toLowerCase().includes(searchQ)
            );
        }
        return filtered;
    }

    /**
     * Renderiza a lista de mensagens da pagina atual com filtros aplicados.
     */
    function renderHistory() {
        const filtered = getFilteredCurrentPage();

        // Contadores
        const totalOnPage = currentMessages.length;
        const showingCount = filtered.length;

        if (countEl) countEl.textContent = 'A mostrar ' + showingCount + ' de ' + totalOnPage + ' nesta pagina';

        // Atualizar controles de paginacao
        if (btnPrev) btnPrev.disabled = (currentPage <= 1);
        if (btnNext) btnNext.disabled = !hasNextPage;
        if (pageIndicatorEl) pageIndicatorEl.textContent = 'Pagina ' + currentPage;
        // Esconder paginacao se nao ha mensagens de todo
        if (paginationBar) paginationBar.style.display = (totalOnPage === 0 && currentPage <= 1 && !hasNextPage) ? 'none' : 'flex';

        if (!filtered.length) {
            const searchQ = (searchInput?.value || '').toLowerCase();
            const typeFilter = filterTypeEl?.value || '';
            const readStatusFilter = filterReadStatusEl?.value || '';
            listDiv.innerHTML = '<div class="search-no-results" style="padding:2rem;">' +
                (searchQ || typeFilter || readStatusFilter ? 'Nenhuma mensagem encontrada para os filtros selecionados nesta pagina' : 'Nenhuma mensagem enviada ainda. Utilize a aba "Mensagens" no painel de Administracao para enviar mensagens.') +
            '</div>';
            return;
        }

        const typeLabel = { info: 'Informacao', warning: 'Aviso', alert: 'Alerta', financial: 'Financeiro' };
        const typeBg = { info: '#e8f0fe', warning: '#fff3cd', alert: '#fce8e6', financial: '#d4edda' };
        const typeColor = { info: '#1a56db', warning: '#856404', alert: '#e63946', financial: '#2d6a4f' };

        let html = '';
        filtered.forEach(m => {
            const date = m.createdAt ? (m.createdAt.toDate ? m.createdAt.toDate() : new Date(m.createdAt)) : new Date();
            const preview = (m.message || '').substring(0, 100);
            const tLabel = typeLabel[m.type] || 'Info';
            const tBg = typeBg[m.type] || '#e8f0fe';
            const tColor = typeColor[m.type] || '#1a56db';
            const readBadge = formatReadBadge(m);
            const borderLeftColor = m.read ? '#28a745' : '#ffc107';

            html += '<div class="admin-msg-item" data-msgid="' + sanitizeAttr(m.id) + '" style="background:var(--primary-hover);border:1px solid var(--primary-border);border-left:3px solid ' + borderLeftColor + ';border-radius:var(--radius-sm);padding:0.9rem;margin-bottom:0.5rem;cursor:pointer;transition:all 0.2s;">' +
                '<div class="flex-between" style="margin-bottom:0.3rem;">' +
                    '<strong style="font-size:0.9rem;">' + escapeHTML(m.title || 'Sem assunto') + '</strong>' +
                    '<div style="display:flex;align-items:center;gap:0.4rem;">' +
                        readBadge +
                        '<small style="color:var(--text-muted);white-space:nowrap;">' + date.toLocaleDateString('pt-AO') + '</small>' +
                    '</div>' +
                '</div>' +
                '<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.3rem;">' +
                    '<span style="font-size:0.78rem;color:var(--text-muted);">Para: <strong>' + escapeHTML(m.userName || 'Desconhecido') + '</strong></span>' +
                    '<span style="font-size:0.68rem;font-weight:700;padding:0.15rem 0.5rem;border-radius:var(--radius-xs);background:' + tBg + ';color:' + tColor + ';">' + tLabel + '</span>' +
                '</div>' +
                '<p style="font-size:0.82rem;color:var(--text-muted);line-height:1.4;">' + escapeHTML(preview) + ((m.message || '').length > 100 ? '...' : '') + '</p>' +
            '</div>';
        });
        listDiv.innerHTML = html;

        // Clicar numa mensagem para ver detalhes completos
        listDiv.querySelectorAll('.admin-msg-item').forEach(item => {
            item.addEventListener('click', () => {
                const msgId = item.dataset.msgid;
                const msg = currentMessages.find(m => m.id === msgId);
                if (!msg) return;
                showAdminMessageDetail(msg);
            });
        });
    }

    /**
     * Mostra os detalhes completos de uma mensagem enviada.
     * Mensagens sao unilaterais — NAO tem campo de resposta.
     * Inclui status de leitura e data/hora de leitura.
     */
    function showAdminMessageDetail(msg) {
        const typeLabel = { info: 'Informacao', warning: 'Aviso', alert: 'Alerta', financial: 'Financeiro' };
        const date = msg.createdAt ? (msg.createdAt.toDate ? msg.createdAt.toDate() : new Date(msg.createdAt)) : new Date();

        let readStatusHtml = '';
        if (msg.read) {
            let readAtStr = '';
            if (msg.readAt) {
                const readAtDate = msg.readAt.toDate ? msg.readAt.toDate() : new Date(msg.readAt);
                readAtStr = ' em ' + readAtDate.toLocaleDateString('pt-AO') + ' as ' + readAtDate.toLocaleTimeString('pt-AO', { hour: '2-digit', minute: '2-digit' });
            }
            readStatusHtml = '<span class="read-status read" style="font-size:0.8rem;">&#9989; Lida' + escapeHTML(readAtStr) + '</span>';
        } else {
            readStatusHtml = '<span class="read-status unread" style="font-size:0.8rem;">&#9203; Nao lida</span>';
        }

        const detailHtml = '<div style="padding:1rem;">' +
            '<button id="backMsgHist" class="btn-outline" style="margin-bottom:0.8rem;padding:0.4rem 0.8rem;font-size:0.8rem;">&#8592; Voltar ao Historico</button>' +
            '<h4 style="color:var(--primary);margin-bottom:0.5rem;">' + escapeHTML(msg.title || 'Sem assunto') + '</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.8rem;font-size:0.82rem;">' +
                '<span style="color:var(--text-muted);">Para: <strong>' + escapeHTML(msg.userName || 'Desconhecido') + '</strong> (' + escapeHTML(msg.userEmail || '') + ')</span>' +
                '<span style="color:var(--text-muted);">| Tipo: ' + (typeLabel[msg.type] || 'Info') + '</span>' +
                '<span style="color:var(--text-muted);">| ' + date.toLocaleString('pt-AO') + '</span>' +
            '</div>' +
            '<div style="margin-bottom:0.8rem;">' + readStatusHtml + '</div>' +
            '<hr style="border:none;border-top:1px solid var(--primary-border);margin:0.8rem 0;">' +
            '<div style="background:var(--white);border:1px solid var(--primary-border);border-left:3px solid var(--primary);border-radius:var(--radius-sm);padding:1rem;font-size:0.9rem;line-height:1.6;white-space:pre-wrap;">' +
                escapeHTML(msg.message || '') +
            '</div>' +
        '</div>';

        listDiv.innerHTML = detailHtml;
        document.getElementById("backMsgHist")?.addEventListener("click", () => renderHistory());
    }

    /**
     * Navegar para a pagina anterior.
     */
    async function goToPrevPage() {
        if (currentPage <= 1) return;
        await loadPage(currentPage - 1);
        renderHistory();
        listDiv.scrollTop = 0;
    }

    /**
     * Navegar para a pagina seguinte.
     */
    async function goToNextPage() {
        if (!hasNextPage) return;
        await loadPage(currentPage + 1);
        renderHistory();
        listDiv.scrollTop = 0;
    }

    /**
     * Resetar paginacao ao alterar filtros e voltar a pagina 1.
     */
    async function resetToFirstPage() {
        pageCursors = [null];
        currentPage = 1;
        exportFilteredCache = null;
        await loadPage(1);
        renderHistory();
    }

    /**
     * Carregar mensagens filtradas para exportacao (sem paginacao).
     * Carrega todas as mensagens em blocos e aplica os filtros atuais.
     */
    async function getFilteredMessagesForExport() {
        Swal.fire({ title: "A preparar exportacao...", allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
            const allMessages = await loadAllMessagesForExport();
            const searchQ = (searchInput?.value || '').toLowerCase();
            const typeFilter = filterTypeEl?.value || '';
            const readStatusFilter = filterReadStatusEl?.value || '';
            let filtered = [...allMessages];
            if (typeFilter) filtered = filtered.filter(m => m.type === typeFilter);
            if (readStatusFilter === 'read') filtered = filtered.filter(m => m.read === true);
            else if (readStatusFilter === 'unread') filtered = filtered.filter(m => m.read !== true);
            if (searchQ) {
                filtered = filtered.filter(m =>
                    (m.userName || '').toLowerCase().includes(searchQ) ||
                    (m.userEmail || '').toLowerCase().includes(searchQ) ||
                    (m.title || '').toLowerCase().includes(searchQ) ||
                    (m.message || '').toLowerCase().includes(searchQ)
                );
            }
            Swal.close();
            return filtered;
        } catch (e) {
            Swal.close();
            console.warn("Erro ao carregar mensagens para exportacao:", e);
            return [];
        }
    }

    // ================================================================
    // CARREGAR PRIMEIRA PAGINA
    // ================================================================
    await loadPage(1);
    renderHistory();

    // ================================================================
    // EVENT LISTENERS
    // ================================================================

    // Botoes de paginacao
    btnPrev?.addEventListener("click", goToPrevPage);
    btnNext?.addEventListener("click", goToNextPage);

    // Filtros com debounce — resetar para pagina 1 ao alterar
    let filterTimer = null;
    searchInput?.addEventListener("input", () => {
        clearTimeout(filterTimer);
        filterTimer = setTimeout(resetToFirstPage, 300);
    });
    filterTypeEl?.addEventListener("change", resetToFirstPage);
    filterReadStatusEl?.addEventListener("change", resetToFirstPage);

    // Botoes de exportacao
    document.getElementById("btnExportCSV")?.addEventListener("click", async () => {
        const filtered = await getFilteredMessagesForExport();
        exportMessagesCSV(filtered);
    });
    document.getElementById("btnExportPDF")?.addEventListener("click", async () => {
        const filtered = await getFilteredMessagesForExport();
        exportMessagesPDF(filtered);
    });
}

// [USER] Renderizar conversa de mensagem individual
async function renderMessageConversation(container) {
    const msg = messagesCache.find(m => m.id === currentMessageId);
    if (!msg) { currentView = "messages"; render(); return; }

    // Recarregar dados mais recentes do Firestore para garantir que respostas estão atualizadas
    let freshMsg = msg;
    try {
        const freshDoc = await fs.collection("users").doc(currentUser.uid).collection("messages").doc(currentMessageId).get();
        if (freshDoc.exists) {
            freshMsg = { id: freshDoc.id, ...freshDoc.data() };
            // Atualizar cache
            const idx = messagesCache.findIndex(m => m.id === currentMessageId);
            if (idx !== -1) messagesCache[idx] = freshMsg;
        }
    } catch (e) { /* usar cache */ }

    const typeLabel = { info: 'Informacao', warning: 'Aviso', alert: 'Alerta', financial: 'Financeiro' };
    const date = freshMsg.createdAt ? (freshMsg.createdAt.toDate ? freshMsg.createdAt.toDate() : new Date(freshMsg.createdAt)) : new Date();

    let convHtml = '<div style="max-width:700px;margin:1rem auto;" class="animate-in"><div class="glass-card" style="padding:0;overflow:hidden;">' +

        // Header da conversa
        '<div class="conversation-header">' +
            '<button id="backMsgConv" class="btn-outline" style="margin-bottom:0.5rem;padding:0.4rem 0.8rem;font-size:0.8rem;">&#8592; Voltar</button>' +
            '<h4>' + escapeHTML(freshMsg.title || 'Sem assunto') + '</h4>' +
            '<div class="conv-meta">' +
                'De: ' + escapeHTML(freshMsg.senderName || 'Admin') +
                ' | Tipo: ' + (typeLabel[freshMsg.type] || freshMsg.type || 'Info') +
                ' | ' + date.toLocaleString('pt-AO') +
            '</div>' +
        '</div>' +

        // Área de mensagens (bolhas)
        '<div class="conversation-messages" id="userConvMessages">';

    // Mensagem original do admin
    convHtml += '<div class="conv-bubble admin">' +
        '<div class="bubble-sender">Suporte</div>' +
        escapeHTML(freshMsg.message || '') +
        '<span class="bubble-time">' + date.toLocaleString('pt-AO') + '</span>' +
    '</div>';

    // Respostas
    (freshMsg.replies || []).forEach(reply => {
        const isAdminReply = reply.sender === "admin";
        const replyTime = reply.timestamp ? new Date(reply.timestamp) : new Date();
        convHtml += '<div class="conv-bubble ' + (isAdminReply ? "admin" : "user") + '">' +
            '<div class="bubble-sender">' + (isAdminReply ? "Suporte" : "Voce") + '</div>' +
            escapeHTML(reply.text) +
            '<span class="bubble-time">' + replyTime.toLocaleString('pt-AO') + '</span>' +
        '</div>';
    });

    convHtml += '</div>' +

        // Área de resposta — apenas admins podem responder mensagens
        (isAdmin
            ? '<div class="conversation-reply">' +
                '<textarea id="msgReplyText" rows="3" placeholder="Digite sua resposta..."></textarea>' +
                '<div style="display:flex;gap:0.5rem;align-items:center;">' +
                    '<button id="sendMsgReplyBtn" class="btn-full" style="flex:1;">Responder</button>' +
                    '<button id="refreshUserConvBtn" class="btn-sm btn-outline" title="Atualizar conversa">&#128260;</button>' +
                '</div>' +
            '</div>'
            : '<div class="conversation-reply" style="background:var(--primary-hover);text-align:center;">' +
                '<p style="color:var(--text-muted);font-size:0.85rem;padding:0.5rem;">📩 Esta é uma mensagem informativa. Não é necessário responder.</p>' +
                '<button id="refreshUserConvBtn" class="btn-sm btn-outline" title="Atualizar conversa">&#128260; Atualizar</button>' +
            '</div>'
        ) +

    '</div></div>';

    container.innerHTML = convHtml;

    // Scroll para o fundo
    const messagesDiv = document.getElementById("userConvMessages");
    if (messagesDiv) messagesDiv.scrollTop = messagesDiv.scrollHeight;

    // Marcar mensagem como lida ao abrir
    if (!freshMsg.read) {
        markMessageRead(currentMessageId);
    }

    document.getElementById("backMsgConv")?.addEventListener("click", goBack);

    // Enviar resposta — apenas admins têm permissão para responder
    if (isAdmin) {
        document.getElementById("sendMsgReplyBtn")?.addEventListener("click", async () => {
            const replyText = document.getElementById("msgReplyText")?.value?.trim();
            if (!replyText) return Swal.fire("Erro", "Escreva uma mensagem", "error");
            try {
                await replyToMessage(currentMessageId, replyText);
                Swal.fire("Enviado!", "Resposta enviada", "success");
                await loadUserMessages();
                render();
            } catch (e) { Swal.fire("Erro", e.message, "error"); }
        });
    }

    // Botão atualizar
    document.getElementById("refreshUserConvBtn")?.addEventListener("click", () => render());
}

// [ADMIN] Carregar tab de mensagens no painel admin
async function loadAdminMessagesTab() {
    const threadListDiv = document.getElementById("adminMsgThreadList");
    const newMsgBtn = document.getElementById("adminNewMsgBtn");
    const newMsgForm = document.getElementById("adminNewMsgForm");
    const cancelMsgBtn = document.getElementById("cancelAdminMsgBtn");
    const searchInput = document.getElementById("adminMsgSearchInput");
    const filterType = document.getElementById("adminMsgFilterType");
    const countSpan = document.getElementById("adminMsgCount");
    if (!threadListDiv) return;

    // ============================================================
    // BARRA DE PESQUISA COM AUTOCOMPLETE (substitui dropdown)
    // ============================================================
    const artistSearchInput = document.getElementById("msgArtistSearch");
    const artistResultsDiv = document.getElementById("msgArtistSearchResults");
    const selectedArtistDiv = document.getElementById("msgSelectedArtist");
    const selectedAvatarEl = document.getElementById("msgSelectedAvatar");
    const selectedNameEl = document.getElementById("msgSelectedName");
    const selectedEmailEl = document.getElementById("msgSelectedEmail");
    const changeArtistBtn = document.getElementById("msgChangeArtistBtn");
    const targetUserHidden = document.getElementById("msgTargetUser");

    // Garantir que a lista de utilizadores está carregada
    if (!adminUsersList.length) await loadAllUsersForAdmin();

    // Debounce para pesquisa de artista
    let artistSearchTimer = null;

    /**
     * Realiza a pesquisa de artistas por nome ou email com autocomplete.
     * - Pesquisa local no cache (instantâneo)
     * - Com 3+ caracteres, consulta Firestore para resultados atualizados
     * - Apenas artistas aprovados (status === 'approved')
     * - Máximo 15 resultados por pesquisa
     * - Destaca o termo pesquisado nos resultados
     */
    async function searchArtistsForMsg(query) {
        const q = query.trim().toLowerCase();
        if (!q) {
            artistResultsDiv.innerHTML = '';
            return;
        }

        // Pesquisar no cache local (apenas aprovados)
        let results = adminUsersList.filter(u =>
            u.status === 'approved' && (
                (u.artisticName || '').toLowerCase().includes(q) ||
                (u.email || '').toLowerCase().includes(q)
            )
        );

        // Com 3+ caracteres, consultar Firestore para resultados mais atualizados
        if (q.length >= 3 && results.length < 5) {
            artistResultsDiv.innerHTML = '<div class="search-loading">Pesquisando...</div>';
            try {
                const nameSnap = await fs.collection("users")
                    .where("artisticName", ">=", q.charAt(0).toUpperCase() + q.slice(1))
                    .where("artisticName", "<=", q.charAt(0).toUpperCase() + q.slice(1) + '\uf8ff')
                    .limit(15)
                    .get();

                let firestoreResults = nameSnap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .filter(u => u.status === 'approved');

                // Se poucos resultados, tentar por email
                if (firestoreResults.length < 5) {
                    try {
                        const emailSnap = await fs.collection("users")
                            .where("email", ">=", q)
                            .where("email", "<=", q + '\uf8ff')
                            .limit(10)
                            .get();

                        const emailResults = emailSnap.docs.map(d => ({ id: d.id, ...d.data() }))
                            .filter(u => u.status === 'approved');

                        const existingIds = new Set(firestoreResults.map(r => r.id));
                        emailResults.forEach(r => {
                            if (!existingIds.has(r.id)) firestoreResults.push(r);
                        });
                    } catch (e) { /* ignorar erro de email */ }
                }

                // Mesclar com cache local sem duplicados
                const localIds = new Set(results.map(r => r.id));
                firestoreResults.forEach(r => {
                    if (!localIds.has(r.id)) results.push(r);
                });
            } catch (e) {
                console.warn("[MsgArtistSearch] Erro Firestore:", e);
            }
        }

        // Limitar a 15 resultados
        results = results.slice(0, 15);

        if (!results.length) {
            artistResultsDiv.innerHTML = '<div class="search-no-results">Nenhum artista encontrado para "' + escapeHTML(q) + '"</div>';
            return;
        }

        let html = '';
        results.forEach(u => {
            const initials = (u.artisticName || '?').charAt(0).toUpperCase();
            const plan = u.plan || 'FREE';
            const nameHighlighted = highlightSearchText(u.artisticName || 'N/A', q);
            const emailHighlighted = highlightSearchText(u.email || '', q);

            html += '<div class="search-result-item" data-uid="' + sanitizeAttr(u.id) + '" data-name="' + sanitizeAttr(u.artisticName || '') + '" data-email="' + sanitizeAttr(u.email || '') + '">' +
                '<div class="search-avatar">' + escapeHTML(initials) + '</div>' +
                '<div class="search-info">' +
                    '<strong>' + nameHighlighted + '</strong>' +
                    '<small>' + emailHighlighted + ' | Plano: ' + escapeHTML(plan) + '</small>' +
                '</div>' +
            '</div>';
        });
        artistResultsDiv.innerHTML = html;

        // Clicar num resultado para selecionar o artista
        artistResultsDiv.querySelectorAll('.search-result-item').forEach(item => {
            item.addEventListener('click', () => {
                const uid = item.dataset.uid;
                const name = item.dataset.name;
                const email = item.dataset.email;
                const initials = (name || '?').charAt(0).toUpperCase();

                // Preencher campo hidden e badge de seleção
                if (targetUserHidden) targetUserHidden.value = uid;
                if (selectedAvatarEl) selectedAvatarEl.textContent = initials;
                if (selectedNameEl) selectedNameEl.textContent = name || 'N/A';
                if (selectedEmailEl) selectedEmailEl.textContent = email || '';

                // Mostrar badge, esconder pesquisa e resultados
                selectedArtistDiv?.classList.remove("hidden");
                if (artistSearchInput) artistSearchInput.value = '';
                artistResultsDiv.innerHTML = '';
            });
        });
    }

    /**
     * Destaca o texto pesquisado nos resultados (case-insensitive)
     */
    function highlightSearchText(text, query) {
        if (!text || !query) return escapeHTML(text || '');
        const escaped = escapeHTML(text);
        const safeQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp('(' + safeQuery + ')', 'gi');
        return escaped.replace(regex, '<span class="search-highlight">$1</span>');
    }

    // Configurar evento de pesquisa com debounce
    if (artistSearchInput) {
        artistSearchInput.addEventListener('input', () => {
            clearTimeout(artistSearchTimer);
            artistSearchTimer = setTimeout(() => searchArtistsForMsg(artistSearchInput.value), 300);
        });
        artistSearchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                clearTimeout(artistSearchTimer);
                searchArtistsForMsg(artistSearchInput.value);
            }
        });
    }

    // Botão "Alterar" para limpar seleção e permitir nova pesquisa
    changeArtistBtn?.addEventListener("click", () => {
        if (targetUserHidden) targetUserHidden.value = '';
        selectedArtistDiv?.classList.add("hidden");
        if (artistSearchInput) artistSearchInput.focus();
    });

    // ============================================================
    // MOSTRAR/ESCONDER FORMULÁRIO DE NOVA MENSAGEM
    // ============================================================
    newMsgBtn?.addEventListener("click", () => {
        newMsgForm?.classList.toggle("hidden");
        if (!newMsgForm?.classList.contains("hidden")) {
            newMsgForm.scrollIntoView({ behavior: 'smooth' });
            // Limpar formulário ao abrir
            if (targetUserHidden) targetUserHidden.value = '';
            selectedArtistDiv?.classList.add("hidden");
            if (artistSearchInput) artistSearchInput.value = '';
            artistResultsDiv.innerHTML = '';
            document.getElementById("msgTitle").value = '';
            document.getElementById("msgBody").value = '';
            document.getElementById("adminMsgResult").innerHTML = '';
        }
    });
    cancelMsgBtn?.addEventListener("click", () => {
        newMsgForm?.classList.add("hidden");
    });

    // ============================================================
    // ENVIAR MENSAGEM (usando ID do campo hidden)
    // ============================================================
    document.getElementById("sendAdminMsgBtn")?.addEventListener("click", async () => {
        const targetUid = targetUserHidden?.value;
        const title = document.getElementById("msgTitle")?.value?.trim();
        const body = document.getElementById("msgBody")?.value?.trim();
        const type = document.getElementById("msgType")?.value || "info";
        if (!targetUid) return Swal.fire("Erro", "Selecione um artista como destinatario", "error");
        if (!title) return Swal.fire("Erro", "Escreva o assunto", "error");
        if (!body) return Swal.fire("Erro", "Escreva a mensagem", "error");
        try {
            await adminSendMessage(targetUid, title, body, type);
            Swal.fire("Enviada!", "Mensagem enviada com sucesso", "success");
            // Limpar formulário
            document.getElementById("msgTitle").value = '';
            document.getElementById("msgBody").value = '';
            if (targetUserHidden) targetUserHidden.value = '';
            selectedArtistDiv?.classList.add("hidden");
            if (artistSearchInput) artistSearchInput.value = '';
            artistResultsDiv.innerHTML = '';
            document.getElementById("adminMsgResult").innerHTML = '<div class="info-box green">Mensagem enviada!</div>';
            newMsgForm?.classList.add("hidden");
            // Recarregar threads — carregar todas sem paginacao
            const reloadResult = await loadAllMessagesForAdmin(500, null);
            adminMessagesList = reloadResult.messages;
            // Se ha mais mensagens, carregar o resto
            if (reloadResult.hasMore) {
                const allExport = await loadAllMessagesForExport();
                adminMessagesList = allExport;
            }
            renderAdminMsgThreads();
        } catch (e) { Swal.fire("Erro", e.message, "error"); }
    });

    // Carregar todas as mensagens do admin
    threadListDiv.innerHTML = '<div class="info-box blue">Carregando conversas...</div>';
    const initialResult = await loadAllMessagesForAdmin(500, null);
    adminMessagesList = initialResult.messages;
    if (initialResult.hasMore) {
        adminMessagesList = await loadAllMessagesForExport();
    }

    /**
     * Renderiza a lista de threads (conversas) de mensagens.
     * Agrupa mensagens por utilizador e mostra a última mensagem.
     * Suporta filtro por texto e tipo.
     */
    function renderAdminMsgThreads() {
        const searchQ = (searchInput?.value || '').toLowerCase();
        const typeFilter = filterType?.value || '';

        let filtered = [...adminMessagesList];

        // Filtrar por tipo
        if (typeFilter) {
            filtered = filtered.filter(m => m.type === typeFilter);
        }

        // Filtrar por texto (nome, email, assunto, conteúdo)
        if (searchQ) {
            filtered = filtered.filter(m =>
                (m.userName || '').toLowerCase().includes(searchQ) ||
                (m.userEmail || '').toLowerCase().includes(searchQ) ||
                (m.title || '').toLowerCase().includes(searchQ) ||
                (m.message || '').toLowerCase().includes(searchQ)
            );
        }

        // Agrupar por userId para mostrar conversas
        const userThreads = {};
        filtered.forEach(msg => {
            const key = msg.userId || 'unknown';
            if (!userThreads[key] || (msg.createdAt || 0) > (userThreads[key].createdAt || 0)) {
                userThreads[key] = msg;
            }
        });

        // Contar mensagens não lidas por thread
        const threadEntries = Object.values(userThreads);
        threadEntries.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

        // Atualizar contagem
        if (countSpan) countSpan.textContent = threadEntries.length + ' conversa(s)';

        if (!threadEntries.length) {
            threadListDiv.innerHTML = '<div class="search-no-results" style="padding:2rem;">' +
                (searchQ || typeFilter ? 'Nenhuma conversa encontrada para os filtros selecionados' : 'Nenhuma conversa de mensagem ainda. Clique "+ Nova Mensagem" para iniciar.') +
            '</div>';
            return;
        }

        let html = '<div class="admin-msg-thread">';
        threadEntries.forEach(thread => {
            const initials = (thread.userName || '?').charAt(0).toUpperCase();
            const date = thread.createdAt ? (thread.createdAt.toDate ? thread.createdAt.toDate() : new Date(thread.createdAt)) : new Date();
            const lastReply = (thread.replies || []).length > 0 ? thread.replies[thread.replies.length - 1] : null;
            const preview = lastReply ? (lastReply.text || '').substring(0, 60) : (thread.message || '').substring(0, 60);
            const hasUnreadReplies = (thread.replies || []).some(r => r.sender === 'user');
            const typeLabel = { info: 'Informacao', warning: 'Aviso', alert: 'Alerta', financial: 'Financeiro' };

            html += '<div class="admin-msg-thread-item' + (hasUnreadReplies ? ' has-unread' : '') + '" data-msgid="' + sanitizeAttr(thread.id) + '" data-userid="' + sanitizeAttr(thread.userId || '') + '" data-originalid="' + sanitizeAttr(thread.originalMsgId || '') + '">' +
                '<div class="thread-avatar">' + escapeHTML(initials) + '</div>' +
                '<div class="thread-info">' +
                    '<div class="thread-title">' + escapeHTML(thread.userName || 'Desconhecido') + ' &mdash; ' + escapeHTML(thread.title || 'Sem assunto') + '</div>' +
                    '<div class="thread-preview">' + escapeHTML(preview) + ((preview.length >= 60) ? '...' : '') + '</div>' +
                '</div>' +
                '<div class="thread-meta">' +
                    '<div class="thread-time">' + date.toLocaleDateString('pt-AO') + '</div>' +
                    (hasUnreadReplies ? '<div class="thread-unread">!</div>' : '') +
                    '<div style="font-size:0.65rem;color:var(--text-muted);margin-top:0.15rem;">' + (typeLabel[thread.type] || 'Info') + '</div>' +
                '</div>' +
            '</div>';
        });
        html += '</div>';
        threadListDiv.innerHTML = html;

        // Clicar numa thread para abrir a conversa completa
        threadListDiv.querySelectorAll('.admin-msg-thread-item').forEach(item => {
            item.addEventListener('click', async () => {
                const msgId = item.dataset.msgid;
                const userId = item.dataset.userid;
                const originalId = item.dataset.originalid;
                if (!msgId || !userId) return;

                // Carregar dados completos da conversa
                adminCurrentConvUserId = userId;
                adminCurrentConvMsgId = originalId || msgId;
                currentView = "adminMessageConversation";
                render();
            });
        });
    }

    renderAdminMsgThreads();

    // Configurar filtros com debounce
    let filterTimer = null;
    searchInput?.addEventListener("input", () => {
        clearTimeout(filterTimer);
        filterTimer = setTimeout(renderAdminMsgThreads, 300);
    });
    filterType?.addEventListener("change", renderAdminMsgThreads);
}

/** Carrega a tab de Lançamentos no painel admin */
// [ADMIN] Carregar tab de lançamentos no painel admin
async function loadAdminReleasesTab() {
    const listDiv = document.getElementById("adminReleasesList");
    const filterSelect = document.getElementById("adminReleaseFilter");
    if (!listDiv) return;

    listDiv.innerHTML = '<div class="info-box blue">Carregando lancamentos...</div>';
    const releases = await loadAllReleasesForAdmin();

    const searchInput = document.getElementById("adminReleaseSearch");
    if (searchInput) {
        searchInput.addEventListener("input", () => renderReleases(filterSelect ? filterSelect.value : ''));
    }

    function renderReleases(statusFilter) {
        const searchTerm = (document.getElementById("adminReleaseSearch")?.value || '').toLowerCase().trim();
        let filtered = statusFilter ? releases.filter(r => r.status === statusFilter) : releases;
        if (searchTerm) {
            filtered = filtered.filter(r =>
                (r.mainTitle || '').toLowerCase().includes(searchTerm) ||
                (r.userName || '').toLowerCase().includes(searchTerm)
            );
        }
        if (!filtered.length) {
            listDiv.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:1rem;">Nenhum lancamento encontrado</p>';
            return;
        }
        let h = '';
        filtered.forEach(r => {
            const sc = r.status === 'Publicado' ? 'status-published' : (r.status === 'Rejeitado' ? 'status-rejected' : 'status-pending');
            h += '<div class="admin-user-item" style="cursor:pointer;" data-uid="' + sanitizeAttr(r.userId) + '" data-rid="' + sanitizeAttr(r.id) + '">' +
                '<div style="flex:1;min-width:0;">' +
                    '<strong>' + escapeHTML(r.mainTitle || 'N/A') + '</strong><br>' +
                    '<small style="color:var(--text-muted);">Artista: ' + escapeHTML(r.userName || 'N/A') + ' | Tipo: ' + escapeHTML(r.type || 'N/A') + '</small>' +
                '</div>' +
                '<span class="status-badge ' + sc + '">' + escapeHTML(r.status || 'N/A') + '</span>' +
                '<div class="admin-action-btns">' +
                    (r.status === 'Em analise' ? '<button class="btn-sm btn-success approveRelBtn" data-uid="' + sanitizeAttr(r.userId) + '" data-rid="' + sanitizeAttr(r.id) + '">Aprovar</button><button class="btn-sm btn-danger rejectRelBtn" data-uid="' + sanitizeAttr(r.userId) + '" data-rid="' + sanitizeAttr(r.id) + '">Rejeitar</button>' : '') +
                '</div>' +
            '</div>';
        });
        listDiv.innerHTML = h;

        document.querySelectorAll(".approveRelBtn").forEach(b => b.addEventListener("click", (e) => { e.stopPropagation(); approveRelease(b.dataset.uid, b.dataset.rid); }));
        document.querySelectorAll(".rejectRelBtn").forEach(b => b.addEventListener("click", (e) => { e.stopPropagation(); rejectRelease(b.dataset.uid, b.dataset.rid); }));

        // Clique no card abre modal de detalhes
        document.querySelectorAll("#adminReleasesList .admin-user-item").forEach(card => {
            card.addEventListener("click", () => {
                const r = releases.find(x => x.id === card.dataset.rid && x.userId === card.dataset.uid);
                if (r) adminShowReleaseDetail(r);
            });
        });
    }

    // Modal de detalhes do lancamento
    function adminShowReleaseDetail(r) {
        const sc = r.status === 'Publicado' ? 'status-published' : (r.status === 'Rejeitado' ? 'status-rejected' : 'status-pending');
        const platforms = Array.isArray(r.platforms) ? r.platforms.join(', ') : (r.platforms || 'N/A');
        const releaseDate = r.releaseDate ? new Date(r.releaseDate).toLocaleDateString('pt-AO') : 'N/A';
        const createdAt = r.createdAt ? (r.createdAt.toDate ? r.createdAt.toDate().toLocaleDateString('pt-AO') : new Date(r.createdAt).toLocaleDateString('pt-AO')) : 'N/A';

        const coverHtml = r.coverUrl
            ? '<img src="' + r.coverUrl + '" style="width:100%;max-width:220px;border-radius:8px;margin-bottom:0.8rem;display:block;" alt="Capa">'
            : '<div style="width:100%;max-width:220px;height:140px;background:var(--primary-bg);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);margin-bottom:0.8rem;">Sem capa</div>';

        let tracksHtml = '';
        if (Array.isArray(r.tracks) && r.tracks.length) {
            r.tracks.forEach((t, i) => {
                tracksHtml += '<div style="padding:0.4rem 0;border-bottom:1px solid var(--primary-border);font-size:0.85rem;">' +
                    '<strong>Faixa ' + (i + 1) + ':</strong> ' + escapeHTML(t.title || 'N/A') +
                    (t.audioUrl ? ' <a href="' + t.audioUrl + '" target="_blank" style="color:var(--primary);font-size:0.8rem;margin-left:0.5rem;">\u25B6 Ouvir</a>' : '') +
                '</div>';
            });
        } else if (r.audioUrl) {
            tracksHtml = '<div style="font-size:0.85rem;"><a href="' + r.audioUrl + '" target="_blank" style="color:var(--primary);">\u25B6 Ouvir audio</a></div>';
        } else {
            tracksHtml = '<div style="color:var(--text-muted);font-size:0.85rem;">Sem faixas</div>';
        }

        const proofHtml = r.proofUrl
            ? '<a href="' + r.proofUrl + '" target="_blank" style="color:var(--primary);font-size:0.85rem;">\uD83D\uDCC4 Ver comprovativo</a>'
            : '<span style="color:var(--text-muted);font-size:0.85rem;">Sem comprovativo</span>';

        Swal.fire({
            title: escapeHTML(r.mainTitle || 'Lancamento'),
            html:
                coverHtml +
                '<div style="text-align:left;">' +
                    '<table style="width:100%;font-size:0.85rem;border-collapse:collapse;">' +
                        '<tr><td style="padding:0.35rem 0;color:var(--text-muted);width:40%;">Artista</td><td><strong>' + escapeHTML(r.userName || 'N/A') + '</strong></td></tr>' +
                        '<tr><td style="padding:0.35rem 0;color:var(--text-muted);">Email</td><td>' + escapeHTML(r.userEmail || 'N/A') + '</td></tr>' +
                        '<tr><td style="padding:0.35rem 0;color:var(--text-muted);">Tipo</td><td>' + escapeHTML(r.type || 'N/A') + '</td></tr>' +
                        '<tr><td style="padding:0.35rem 0;color:var(--text-muted);">Genero</td><td>' + escapeHTML(r.genre || 'N/A') + '</td></tr>' +
                        '<tr><td style="padding:0.35rem 0;color:var(--text-muted);">Data lancamento</td><td>' + releaseDate + '</td></tr>' +
                        '<tr><td style="padding:0.35rem 0;color:var(--text-muted);">Submetido em</td><td>' + createdAt + '</td></tr>' +
                        '<tr><td style="padding:0.35rem 0;color:var(--text-muted);">Status</td><td><span class="status-badge ' + sc + '">' + escapeHTML(r.status || 'N/A') + '</span></td></tr>' +
                        '<tr><td style="padding:0.35rem 0;color:var(--text-muted);">Plataformas</td><td style="font-size:0.8rem;">' + escapeHTML(platforms) + '</td></tr>' +
                        '<tr><td style="padding:0.35rem 0;color:var(--text-muted);">Comprovativo</td><td>' + proofHtml + '</td></tr>' +
                    '</table>' +
                    '<div style="margin-top:0.8rem;"><strong style="font-size:0.85rem;">Faixas:</strong>' + tracksHtml + '</div>' +
                '</div>',
            showCloseButton: true,
            showConfirmButton: r.status === 'Em analise',
            confirmButtonText: 'Aprovar',
            confirmButtonColor: '#28a745',
            showDenyButton: r.status === 'Em analise',
            denyButtonText: 'Rejeitar',
            denyButtonColor: '#dc3545',
            width: '90%'
        }).then(res => {
            if (res.isConfirmed) approveRelease(r.userId, r.id);
            if (res.isDenied) rejectRelease(r.userId, r.id);
        });
    }

    renderReleases('');
    if (filterSelect) filterSelect.addEventListener("change", () => renderReleases(filterSelect.value));
}

}

// [ADMIN] Carregar tab de logs no painel admin
async function loadAdminLogsTab() {

    const logs = await loadAdminLogs(50);

    if (!logs.length) {
        logsDiv.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:1rem;">Nenhum log registado</p>';

    }

    let h = '<div style="max-height:500px;overflow-y:auto;">';

        const actionColors = {

/** Carrega a tab de Editar Artista no painel admin - com barra de pesquisa funcional */
// [ADMIN] Carregar tab de edição de artista no painel admin
async function loadAdminEditArtistTab() {
    const searchInput = document.getElementById("editArtistSearch");
    const resultsDiv = document.getElementById("editArtistSearchResults");
    const contentDiv = document.getElementById("editArtistContent");
    if (!searchInput || !resultsDiv || !contentDiv) return;

    // Garantir que a lista de utilizadores está carregada
    if (!adminUsersList.length) await loadAllUsersForAdmin();

    contentDiv.innerHTML = '<div class="info-box blue">Pesquise um artista pelo nome ou email para editar os seus dados</div>';

    // Debounce timer para pesquisa
    let searchTimer = null;

    /**
     * Realiza a pesquisa de artistas por nome ou email.
     * Utiliza o cache local (adminUsersList) para performance,
     * mas também consulta Firestore em tempo real se o utilizador
     * digitar 3+ caracteres (para resultados mais atualizados).
     *
     * A pesquisa é case-insensitive e suporta correspondência parcial.
     */
    async function performSearch(query) {
        const q = query.trim().toLowerCase();

        if (!q) {
            resultsDiv.innerHTML = '';
            contentDiv.innerHTML = '<div class="info-box blue">Pesquise um artista pelo nome ou email para editar os seus dados</div>';
            return;
        }

        // Pesquisar no cache local primeiro (instantâneo)
        // Apenas artistas aprovados devem aparecer para edição
        let localResults = adminUsersList.filter(u =>
            u.status === 'approved' && (
                (u.artisticName || '').toLowerCase().includes(q) ||
                (u.email || '').toLowerCase().includes(q)
            )
        );

        // Se houver 3+ caracteres, consultar Firestore para resultados mais atualizados
        if (q.length >= 3) {
            resultsDiv.innerHTML = '<div class="search-loading">Pesquisando...</div>';

            try {
                // Consulta Firestore por nome artístico (prefixo)
                const nameSnap = await fs.collection("users")
                    .where("artisticName", ">=", q.charAt(0).toUpperCase() + q.slice(1))
                    .where("artisticName", "<=", q.charAt(0).toUpperCase() + q.slice(1) + '\uf8ff')
                    .limit(20)
                    .get();

                // Apenas artistas aprovados devem aparecer para edição
                let firestoreResults = nameSnap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .filter(u => u.status === 'approved');

                // Se poucos resultados, tentar por email também
                if (firestoreResults.length < 5) {
                    const emailSnap = await fs.collection("users")
                        .where("email", ">=", q)
                        .where("email", "<=", q + '\uf8ff')
                        .limit(10)
                        .get();

                    // Apenas artistas aprovados — mesclar sem duplicados
                    const emailResults = emailSnap.docs.map(d => ({ id: d.id, ...d.data() }))
                        .filter(u => u.status === 'approved');
                    const existingIds = new Set(firestoreResults.map(r => r.id));
                    emailResults.forEach(r => {
                        if (!existingIds.has(r.id)) firestoreResults.push(r);
                    });
                }

                // Mesclar resultados do Firestore com o cache local
                const mergedIds = new Set(localResults.map(r => r.id));
                firestoreResults.forEach(r => {
                    if (!mergedIds.has(r.id)) {
                        localResults.push(r);
                    } else {
                        // Atualizar dados do cache com dados mais recentes do Firestore
                        const idx = localResults.findIndex(lr => lr.id === r.id);
                        if (idx !== -1) localResults[idx] = { ...localResults[idx], ...r };
                    }
                });
            } catch (e) {
                console.warn("[EditarArtista] Erro na pesquisa Firestore, usando cache local:", e);
            }
        }

        // Renderizar resultados
        if (!localResults.length) {
            resultsDiv.innerHTML = '<div class="search-no-results">Nenhum artista encontrado para "' + escapeHTML(q) + '"</div>';
            return;
        }

        let html = '';
        localResults.slice(0, 15).forEach(u => {
            const initials = (u.artisticName || '?').charAt(0).toUpperCase();
            const statusBadge = u.status === 'approved' ? 'status-published' : (u.status === 'rejected' ? 'status-rejected' : 'status-pending');
            const plan = u.plan || 'FREE';

            // Destacar texto pesquisado
            const nameHighlighted = highlightText(u.artisticName || 'N/A', q);
            const emailHighlighted = highlightText(u.email || '', q);

            html += '<div class="search-result-item" data-uid="' + sanitizeAttr(u.id) + '">' +
                '<div class="search-avatar">' + escapeHTML(initials) + '</div>' +
                '<div class="search-info">' +
                    '<strong>' + nameHighlighted + '</strong>' +
                    '<small>' + emailHighlighted + ' | Plano: ' + escapeHTML(plan) + ' | Streams: ' + Number(u.totalStreams || 0).toLocaleString('pt-AO') + '</small>' +
                '</div>' +
                '<div class="search-status">' +
                    '<span class="status-badge ' + statusBadge + '">' + escapeHTML(u.status || 'N/A') + '</span>' +
                '</div>' +
            '</div>';
        });

        resultsDiv.innerHTML = html;

        // Clicar num resultado para carregar dados do artista
        resultsDiv.querySelectorAll('.search-result-item').forEach(item => {
            item.addEventListener('click', () => {
                const uid = item.dataset.uid;
                if (uid) {
                    // Limpar seleção anterior
                    resultsDiv.querySelectorAll('.search-result-item').forEach(i => i.style.borderColor = '');
                    item.style.borderColor = 'var(--primary)';
                    loadArtistForEdit(uid, contentDiv);
                }
            });
        });
    }

    /**
     * Destaca o texto pesquisado no resultado (case-insensitive)
     */
    function highlightText(text, query) {
        if (!text || !query) return escapeHTML(text || '');
        const escaped = escapeHTML(text);
        const regex = new RegExp('(' + escapeRegex(query) + ')', 'gi');
        return escaped.replace(regex, '<span class="search-highlight">$1</span>');
    }

    function escapeRegex(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // Configurar evento de pesquisa com debounce (300ms)
    searchInput.addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => performSearch(searchInput.value), 300);
    });

    // Pesquisa imediata ao pressionar Enter
    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            clearTimeout(searchTimer);
            performSearch(searchInput.value);
        }
    });
}

/** Resetar contagem de lançamentos de um artista
 *
 * Define releaseCount=0 no Firestore, mantendo a quota atual.
 * Isto permite ao artista criar novos lançamentos dentro da sua quota.
 * Regista a ação no adminLogs e notifica o artista.
 */
// [ADMIN] Reiniciar contagem de lançamentos de um artista
async function resetReleaseCount(uid) {
    if (!uid || !isAdmin) return;

    // Buscar dados atuais para mostrar na confirmação
    let currentCount = 0;
    let currentQuota = 1;
    let artistName = '';
    try {
        const doc = await fs.collection("users").doc(uid).get();
        if (doc.exists) {
            const data = doc.data();
            currentCount = data.releaseCount || 0;
            currentQuota = data.releaseQuota || 1;
            artistName = data.artisticName || 'N/A';
        }
    } catch (e) { /* usar defaults */ }

    // Se já está em 0, informar
    if (currentCount === 0) {
        Swal.fire("Informacao", "A contagem de lancamentos ja esta em 0. Nao e necessario resetar.", "info");
        return;
    }

    // Pedir confirmação ao admin
    const confirmed = await Swal.fire({
        title: "Resetar Contagem de Lancamentos?",
        html: '<div style="text-align:left;font-size:0.85rem;">' +
            '<p><strong>Artista:</strong> ' + escapeHTML(artistName) + '</p>' +
            '<p><strong>Contagem atual:</strong> ' + currentCount + ' lancamento(s)</p>' +
            '<p><strong>Quota atual:</strong> ' + currentQuota + ' lancamento(s)</p>' +
            '<p><strong>Apos reset:</strong> 0 / ' + currentQuota + ' (pode criar ' + currentQuota + ' novo(s))</p>' +
            '<hr style="margin:0.5rem 0;">' +
            '<p style="color:var(--warning);font-weight:600;">Atencao: Isto permite ao artista criar novos lancamentos. Os lancamentos existentes nao serao apagados.</p>' +
        '</div>',
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: "Sim, resetar",
        cancelButtonText: "Cancelar",
        confirmButtonColor: "#e07c24"
    });

    if (!confirmed.isConfirmed) return;

    try {
        Swal.fire({ title: "Resetando...", allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

        // Atualizar no Firestore
        await fs.collection("users").doc(uid).update({
            releaseCount: 0
        });

        // Notificar o artista
        await fs.collection("users").doc(uid).collection("notifications").add({
            msg: "A contagem dos seus lancamentos foi reiniciada. Agora pode criar ate " + currentQuota + " lancamento(s) novo(s).",
            time: new Date().toISOString(),
            read: false,
            type: "account",
            relatedId: uid
        });

        // Notificação push
        sendPushNotification(uid, 'Contagem Reiniciada', 'A contagem dos seus lancamentos foi reiniciada. Pode criar ate ' + currentQuota + ' lancamento(s).', { type: 'account', action: 'reset_release_count' }).catch(e => console.warn('[FCM] Erro push reset count:', e));

        // Registar no adminLogs
        await addAdminLog("reset_release_count", uid, "Contagem resetada de " + currentCount + " para 0 (quota=" + currentQuota + ")");

        Swal.close();
        Swal.fire("Sucesso!", "Contagem de lancamentos resetada de " + currentCount + " para 0.", "success");

        // Atualizar cache e recarregar formulário
        await loadAllUsersForAdmin();
        const contentDiv = document.getElementById("editArtistContent");
        if (contentDiv) await loadArtistForEdit(uid, contentDiv);

    } catch (e) {
        Swal.close();
        Swal.fire("Erro", "Falha ao resetar contagem: " + e.message, "error");
    }
}

/** Guarda as alterações feitas no artista selecionado */
// [ADMIN] Guardar edições do artista
async function saveArtistEdits(uid) {
    const resultDiv = document.getElementById("saveArtistResult");
    if (!uid) return;

    // Recolher dados principais
    const totalStreams = parseInt(document.getElementById("editTotalStreams")?.value) || 0;
    const balance = parseFloat(document.getElementById("editBalance")?.value) || 0;
    const releaseCount = parseInt(document.getElementById("editReleaseCount")?.value) || 0;
    const releaseQuota = parseInt(document.getElementById("editReleaseQuota")?.value) || 1;

    // Recolher platformStats
    const platformStats = {};
    const platStreamsInputs = document.querySelectorAll('.plat-streams-input');
    const platRevenueInputs = document.querySelectorAll('.plat-revenue-input');

    // Construir mapa de plataformas a partir dos inputs
    platStreamsInputs.forEach(input => {
        const platName = input.dataset.platform;
        const isRemoved = input.closest('.platform-edit-row')?.querySelector('.remove-plat-btn[data-removed="true"]');
        if (isRemoved) return; // Pular plataformas removidas
        const streams = parseInt(input.value) || 0;
        // Encontrar o input de revenue correspondente
        const revenueInput = document.querySelector('.plat-revenue-input[data-platform="' + platName + '"]');
        const revenue = parseFloat(revenueInput?.value) || 0;
        // Preservar campos existentes como lastImport, platform
        const existing = editArtistPlatformStatsOriginal[platName] || {};
        platformStats[platName] = {
            streams: streams,
            revenue: revenue,
            lastImport: existing.lastImport || new Date().toISOString(),
            platform: existing.platform || platName
        };
    });

    // Recolher alterações de status dos lançamentos
    const releaseStatusChanges = [];
    document.querySelectorAll('.release-status-select').forEach(select => {
        const releaseId = select.dataset.releaseId;
        const newStatus = select.value;
        // Encontrar o lançamento no cache
        const release = editArtistReleasesCache.find(r => r.id === releaseId);
        if (release && release.status !== newStatus) {
            releaseStatusChanges.push({ id: releaseId, oldStatus: release.status, newStatus: newStatus });
        }
    });

    // Confirmar com o admin
    let confirmMsg = 'Tem certeza que deseja guardar as alteracoes?\n\n';
    confirmMsg += 'Total Streams: ' + totalStreams + '\n';
    confirmMsg += 'Saldo: ' + Number(balance).toLocaleString('pt-AO') + ' Kz\n';
    confirmMsg += 'Lancamentos: ' + releaseCount + ' / Quota: ' + releaseQuota + '\n';
    confirmMsg += 'Plataformas: ' + Object.keys(platformStats).length + '\n';
    if (releaseStatusChanges.length > 0) {
        confirmMsg += 'Alteracoes de status: ' + releaseStatusChanges.length + ' lancamento(s)\n';
    }

    const confirmed = await Swal.fire({
        title: "Guardar Alteracoes?",
        html: '<div style="text-align:left;font-size:0.85rem;white-space:pre-line;">' + escapeHTML(confirmMsg) + '</div>',
        icon: "question",
        showCancelButton: true,
        confirmButtonText: "Sim, guardar",
        cancelButtonText: "Cancelar",
        confirmButtonColor: "#9b4dff"
    });

    if (!confirmed.isConfirmed) return;

    try {
        Swal.fire({ title: "Guardando...", allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

        // Construir objeto de atualização
        const updateData = {
            totalStreams: totalStreams,
            balance: balance,
            releaseCount: releaseCount,
            releaseQuota: releaseQuota,
            platformStats: platformStats,
            lastUpdatedStats: firebase.firestore.FieldValue.serverTimestamp()
        };

        // Atualizar dados do artista
        await fs.collection("users").doc(uid).update(updateData);

        // Atualizar status dos lançamentos
        for (const change of releaseStatusChanges) {
            await fs.collection("users").doc(uid).collection("releases").doc(change.id).update({ status: change.newStatus });
        }

        // Registar no adminLogs
        let logDetails = 'totalStreams=' + totalStreams + ', balance=' + balance + ', releaseCount=' + releaseCount;
        if (releaseStatusChanges.length > 0) {
            logDetails += ', status_alterados=' + releaseStatusChanges.map(c => c.id.substring(0,8) + ':' + c.newStatus).join(', ');
        }
        await addAdminLog("edit_artist", uid, logDetails);

        // Notificar o artista
        await fs.collection("users").doc(uid).collection("notifications").add({
            msg: "Os seus dados foram atualizados pela administracao.",
            time: new Date().toISOString(),
            read: false,
            type: "account",
            relatedId: uid
        });

        Swal.fire("Sucesso!", "Alteracoes guardadas com sucesso.", "success");

        // Atualizar cache e recarregar
        await loadAllUsersForAdmin();
        const contentDiv = document.getElementById("editArtistContent");
        if (contentDiv) await loadArtistForEdit(uid, contentDiv);

    } catch (e) {
        Swal.close();
        Swal.fire("Erro", "Falha ao guardar: " + e.message, "error");
    }
}

/**
 * Carregar a tab de Push Notificações no painel admin
 *
 * Funcionalidades:
 * - Exibir estado da configuração FCM (VAPID Key, Server Key, Service Worker)
 * - Popular dropdown de destinatários (artistas com token FCM)
 * - Listar utilizadores com push activo
 * - Carregar histórico de notificações push enviadas
 * - Configurar o botão de envio manual
 */
// [ADMIN] Carregar tab de push notificações
async function loadAdminPushNotifTab() {
    // ============================================================
    // 1. Mostrar estado da configuração FCM
    // ============================================================
    const configDiv = document.getElementById("pushConfigStatus");
    if (configDiv) {
        const permStatus = checkPushPermissionStatus();

                '<h6>Permissao de Notificacoes</h6>' +
                '<p>Estado: <span class="push-status-badge push-status-' + permStatus + '">' + (permStatus === 'granted' ? 'Concedida' : permStatus === 'denied' ? 'Negada' : 'Nao pedida') + '</span></p>' +
