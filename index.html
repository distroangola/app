    <style>
        /* ========== CSS VARIABLES ========== */
        :root {
            --primary: #9b4dff;
            --primary-light: #b77eff;
            --primary-bg: #f5f0ff;
            --primary-border: #e0d4ff;
            --primary-hover: #f0eaff;
            --danger: #e63946;
            --danger-hover: #ff5c6e;
            --success: #2d6a4f;
            --success-light: #40916c;
            --warning: #e07c24;
            --warning-light: #f4a261;
            --info: #1a56db;
            --text: #1a1a2e;
            --text-muted: #4a4a6a;
            --white: #ffffff;
            --card-bg: rgba(255,255,255,0.95);
            --shadow: 0 8px 20px rgba(0,0,0,0.05);
            --radius: 2rem;
            --radius-sm: 1rem;
            --radius-xs: 0.5rem;
        }

        /* ========== RESET & BASE ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: var(--primary-bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* ========== GLASSMORPHISM CARDS ========== */
        .glass-card { background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: var(--radius); border: 1px solid var(--primary-border); box-shadow: var(--shadow); padding: 1.8rem; transition: all 0.3s ease; }
        .glass-card:hover { box-shadow: 0 12px 32px rgba(155,77,255,0.12); }

        /* ========== HEADER ========== */
        .glass-header { background: var(--white); border-bottom: 1px solid var(--primary-border); padding: 0.8rem 1rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.03); backdrop-filter: blur(10px); }

        /* ========== BUTTONS ========== */
        button, .btn { background: var(--primary); border: none; padding: 0.8rem 1.5rem; border-radius: var(--radius); font-weight: 600; color: var(--white); cursor: pointer; transition: all 0.2s; font-size: 0.9rem; display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem; }
        button:hover, .btn:hover { background: var(--primary-light); transform: scale(0.98); }
        button:active { transform: scale(0.96); }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: var(--success-light); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: rgba(155,77,255,0.1); }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.8rem; border-radius: var(--radius-sm); }
        .btn-full { width: 100%; }
        .btn-white { background: var(--white); color: var(--primary); border: 1px solid var(--primary-border); }

        /* ========== INPUTS ========== */
        input, select, textarea { background: var(--white); border: 1.5px solid var(--primary-border); border-radius: var(--radius-sm); padding: 0.75rem 1rem; color: var(--text); width: 100%; outline: none; margin: 0.35rem 0; font-size: 0.9rem; transition: all 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(155,77,255,0.2); }
        input::placeholder { color: #a89cc8; }
        textarea { resize: vertical; min-height: 80px; }
        label { font-weight: 500; margin-top: 0.7rem; display: block; font-size: 0.85rem; color: var(--text-muted); }

        /* ========== LAYOUT ========== */
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex-center { display: flex; justify-content: center; align-items: center; }
        .flex-col { display: flex; flex-direction: column; }
        .gap-sm { gap: 0.5rem; }
        .gap-md { gap: 1rem; }
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mt-3 { margin-top: 1.5rem; }
        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .mb-3 { margin-bottom: 1.5rem; }
        .p-2 { padding: 1rem; }
        .p-3 { padding: 1.5rem; }

        /* ========== HAMBURGER MENU ========== */
        .menu-hamburger { font-size: 1.6rem; cursor: pointer; color: var(--primary); padding: 0.3rem; border-radius: var(--radius); transition: 0.2s; background: none; border: none; }
        .menu-hamburger:hover { background: var(--primary-hover); }

        /* ========== SIDEBAR ========== */
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: var(--white); box-shadow: 4px 0 24px rgba(0,0,0,0.12); transition: left 0.3s cubic-bezier(0.4,0,0.2,1); z-index: 1000; padding: 1.5rem 1rem; border-right: 1px solid var(--primary-border); overflow-y: auto; }
        .sidebar.open { left: 0; }
        .sidebar-title { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-bottom: 1.5rem; padding-bottom: 0.8rem; border-bottom: 2px solid var(--primary-border); }
        .sidebar a { display: flex; align-items: center; gap: 0.7rem; color: var(--text); padding: 0.75rem 1rem; border-radius: var(--radius-sm); text-decoration: none; margin: 0.3rem 0; cursor: pointer; font-weight: 500; font-size: 0.9rem; transition: all 0.2s; }
        .sidebar a:hover { background: var(--primary-hover); color: var(--primary); transform: translateX(4px); }
        .sidebar a.active { background: var(--primary); color: var(--white); }
        .sidebar-close { position: absolute; top: 1rem; right: 1rem; font-size: 1.4rem; cursor: pointer; color: var(--text-muted); background: none; border: none; padding: 0.3rem; border-radius: 50%; }
        .sidebar-close:hover { background: var(--primary-hover); color: var(--primary); }
        .sidebar-divider { border-top: 1px solid var(--primary-border); margin: 0.5rem 0; }

        /* ========== OVERLAY ========== */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); z-index: 999; display: none; backdrop-filter: blur(2px); }
        .overlay.active { display: block; }

        /* ========== CHECKBOX ========== */
        .checkbox-label { display: flex; align-items: center; gap: 10px; margin: 1rem 0; font-size: 0.9rem; cursor: pointer; }
        .checkbox-label input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }

        /* ========== PASSWORD ========== */
        .password-wrapper { position: relative; }
        .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: transparent; padding: 0; font-size: 1.2rem; color: var(--primary); cursor: pointer; border: none; min-width: auto; }
        .toggle-password:hover { background: transparent; transform: translateY(-50%); }

        /* ========== RELEASE ITEMS ========== */
        .release-item { background: var(--primary-hover); border-radius: var(--radius-sm); padding: 1rem; margin: 0.5rem 0; border: 1px solid var(--primary-border); transition: all 0.2s; }
        .release-item:hover { border-color: var(--primary); }
        .status-badge { display: inline-block; padding: 0.2rem 0.7rem; border-radius: var(--radius); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.02em; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-published { background: #d4edda; color: #155724; }
        .status-rejected { background: #f8d7da; color: #721c24; }

        /* ========== TRACK INPUT ========== */
        .track-input { margin-bottom: 1rem; border-left: 3px solid var(--primary); padding-left: 1rem; background: rgba(155,77,255,0.03); border-radius: 0 var(--radius-xs) var(--radius-xs) 0; padding-top: 0.5rem; padding-bottom: 0.5rem; padding-right: 0.5rem; }

        /* ========== DIVIDER ========== */
        hr { border: none; border-top: 1px solid var(--primary-border); margin: 1rem 0; }

        /* ========== TERMS SCROLL ========== */
        .terms-scroll-box { max-height: 180px; overflow-y: auto; background: var(--primary-hover); border-radius: var(--radius-sm); padding: 1rem; font-size: 0.78rem; margin: 1rem 0; border: 1px solid var(--primary-border); line-height: 1.6; }

        /* ========== NOTIFICATIONS ========== */
        .notification-btn { cursor: pointer; font-size: 1.4rem; padding: 0.4rem; border-radius: var(--radius); transition: 0.2s; background: none; color: var(--primary); display: inline-flex; align-items: center; gap: 5px; position: relative; }
        .notification-btn:hover { background: var(--primary-hover); transform: none; }
        .notif-badge { background: var(--danger); color: var(--white); font-size: 0.65rem; font-weight: 700; padding: 0.1rem 0.4rem; border-radius: 50%; position: absolute; top: 0; right: 0; min-width: 16px; text-align: center; }

        /* ========== TICKETS ========== */
        .ticket-list { max-height: 400px; overflow-y: auto; margin-bottom: 1rem; }
        .ticket-item { background: var(--primary-hover); border-radius: var(--radius-sm); padding: 0.9rem; margin-bottom: 0.5rem; cursor: pointer; border: 1px solid var(--primary-border); transition: all 0.2s; }
        .ticket-item:hover { background: rgba(155,77,255,0.15); border-color: var(--primary); }
        .chat-message { background: var(--primary-hover); border-radius: var(--radius-sm); padding: 0.6rem 1rem; margin: 0.5rem 0; font-size: 0.9rem; line-height: 1.5; }
        .chat-message.admin { background: rgba(155,77,255,0.12); border-left: 3px solid var(--primary); }
        .chat-message.user { background: var(--primary-hover); }

        /* ========== BACK BUTTON ========== */
        .back-button { margin-bottom: 1rem; }

        /* ========== SKELETON LOADING ========== */
        .skeleton { background: linear-gradient(90deg, var(--primary-border) 25%, var(--primary-hover) 50%, var(--primary-border) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: var(--radius-sm); }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton-text { height: 1rem; width: 100%; margin: 0.5rem 0; }
        .skeleton-button { height: 2.5rem; width: 100%; border-radius: var(--radius); }
        .skeleton-card { height: 120px; width: 100%; margin: 0.5rem 0; }
        .loading-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }

        /* ========== STATS CARDS ========== */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; }
        .stat-card { background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: var(--radius-sm); padding: 1.2rem; color: var(--white); text-align: center; }
        .stat-card h4 { font-size: 0.8rem; opacity: 0.9; margin-bottom: 0.3rem; }
        .stat-card .stat-value { font-size: 1.8rem; font-weight: 800; }

        /* ========== LOGO ========== */
        .logo-icon { font-size: 4rem; display: block; margin-bottom: 0.5rem; filter: drop-shadow(0 4px 8px rgba(155,77,255,0.3)); }
        .logo-title { font-size: 1.8rem; font-weight: 800; color: var(--primary); letter-spacing: 0.05em; }
        .logo-subtitle { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; margin: 0.8rem 0; }

        /* ========== RADIO GROUP ========== */
        .radio-group { display: flex; gap: 1rem; margin: 0.5rem 0; flex-wrap: wrap; }
        .radio-label { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; font-size: 0.9rem; }
        .radio-label input[type="radio"] { accent-color: var(--primary); width: 16px; height: 16px; cursor: pointer; }

        /* ========== PLAN CARDS ========== */
        .plan-card { background: var(--white); border: 2px solid var(--primary-border); border-radius: var(--radius-sm); padding: 1.2rem; margin: 0.8rem 0; transition: all 0.2s; }
        .plan-card:hover { border-color: var(--primary); box-shadow: 0 4px 12px rgba(155,77,255,0.15); }
        .plan-card h4 { color: var(--primary); margin-bottom: 0.3rem; }
        .plan-card .plan-price { font-size: 1.4rem; font-weight: 800; color: var(--text); }
        .plan-card .plan-detail { font-size: 0.8rem; color: var(--text-muted); }

        /* ========== PLATFORM CHIPS ========== */
        .platform-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem; }
        @media (min-width: 600px) { .platform-grid { grid-template-columns: 1fr 1fr 1fr; } }

        /* ========== NOTIFICATION PANEL ========== */
        .notif-panel { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: var(--white); box-shadow: -4px 0 24px rgba(0,0,0,0.12); z-index: 1001; transition: right 0.3s; padding: 1.5rem; overflow-y: auto; border-left: 1px solid var(--primary-border); }
        .notif-panel.open { right: 0; }
        .notif-item { padding: 0.7rem; border-bottom: 1px solid var(--primary-border); font-size: 0.85rem; line-height: 1.4; }
        .notif-item.unread { background: var(--primary-hover); border-radius: var(--radius-xs); }
        .notif-item.clickable { cursor: pointer; transition: all 0.2s; }
        .notif-item.clickable:hover { background: rgba(155,77,255,0.1); transform: translateX(2px); }
        .notif-type-icon { margin-right: 0.3rem; }
        .notif-time { font-size: 0.7rem; color: var(--text-muted); }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--primary-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            .glass-card { padding: 1.2rem; margin: 0; border-radius: 1.2rem; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
            .logo-title { font-size: 1.5rem; }
            .platform-grid { grid-template-columns: 1fr 1fr; }
        }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .pulse { animation: pulse 2s infinite; }

        /* ========== INFO BOX ========== */
        .info-box { background: #fff3cd; border: 1px solid #ffc107; border-radius: var(--radius-sm); padding: 1rem; font-size: 0.85rem; color: #856404; margin: 0.8rem 0; }
        .info-box.blue { background: #e8f0fe; border-color: #4285f4; color: #1a56db; }
        .info-box.red { background: #fce8e6; border-color: var(--danger); color: var(--danger); }
        .info-box.green { background: #d4edda; border-color: var(--success); color: var(--success); }

        /* ========== WITHDRAW METHOD ========== */
        .method-option { border: 2px solid var(--primary-border); border-radius: var(--radius-sm); padding: 1rem; cursor: pointer; transition: all 0.2s; text-align: center; }
        .method-option:hover, .method-option.selected { border-color: var(--primary); background: var(--primary-hover); }

        /* ========== IMPORT AREA (NOVO) ========== */
        .import-drop-zone { border: 2px dashed var(--primary-border); border-radius: var(--radius-sm); padding: 2rem; text-align: center; transition: all 0.2s; cursor: pointer; background: var(--primary-hover); }
        .import-drop-zone:hover, .import-drop-zone.dragover { border-color: var(--primary); background: rgba(155,77,255,0.15); }
        .import-drop-zone .drop-icon { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary); }

        /* ========== TAB SYSTEM (NOVO) ========== */
        .tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--primary-border); margin-bottom: 1rem; overflow-x: auto; }
        .tab-btn { padding: 0.6rem 1rem; background: none; color: var(--text-muted); border: none; border-bottom: 2px solid transparent; font-weight: 600; font-size: 0.85rem; white-space: nowrap; cursor: pointer; border-radius: 0; transition: 0.2s; }
        .tab-btn:hover { color: var(--primary); background: none; transform: none; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* ========== PROGRESS BAR (NOVO) ========== */
        .progress-bar { width: 100%; height: 8px; background: var(--primary-border); border-radius: 4px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light)); border-radius: 4px; transition: width 0.5s ease; }

        /* ========== IMPORT HISTORY (NOVO) ========== */
        .import-item { background: var(--primary-hover); border-radius: var(--radius-sm); padding: 0.8rem 1rem; margin: 0.4rem 0; border: 1px solid var(--primary-border); }
        .import-item .import-platform { font-weight: 700; font-size: 0.9rem; }
        .import-item .import-date { font-size: 0.75rem; color: var(--text-muted); }
        .import-item .import-stats { font-size: 0.8rem; color: var(--text-muted); }

        /* ========== ADMIN STATS GRID (NOVO) ========== */
        .admin-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin: 1rem 0; }
        @media (min-width: 600px) { .admin-stats-grid { grid-template-columns: 1fr 1fr 1fr; } }
        .admin-stat-card { background: var(--white); border: 1px solid var(--primary-border); border-radius: var(--radius-sm); padding: 1rem; text-align: center; }
        .admin-stat-card .admin-stat-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.3rem; }
        .admin-stat-card .admin-stat-value { font-size: 1.4rem; font-weight: 800; color: var(--primary); }

        /* ========== MESSAGE ITEMS (NOVO) ========== */
        .message-item { background: var(--primary-hover); border-radius: var(--radius-sm); padding: 0.9rem; margin-bottom: 0.5rem; border: 1px solid var(--primary-border); transition: all 0.2s; cursor: pointer; }
        .message-item:hover { border-color: var(--primary); }
        .message-item.unread { border-left: 3px solid var(--primary); background: rgba(155,77,255,0.08); }
        .message-type-info { border-left-color: var(--info); }
        .message-type-warning { border-left-color: var(--warning); }
        .message-type-alert { border-left-color: var(--danger); }
        .message-type-financial { border-left-color: var(--success); }
        .msg-badge { background: var(--danger); color: var(--white); font-size: 0.65rem; font-weight: 700; padding: 0.1rem 0.4rem; border-radius: 50%; min-width: 16px; text-align: center; display: inline-block; }

        /* ========== ADMIN USER LIST (NOVO) ========== */
        .admin-user-item { display: flex; justify-content: space-between; align-items: center; background: var(--primary-hover); border-radius: var(--radius-sm); padding: 0.8rem 1rem; margin: 0.4rem 0; border: 1px solid var(--primary-border); flex-wrap: wrap; gap: 0.5rem; }
        .admin-user-item:hover { border-color: var(--primary); }
        .admin-action-btns { display: flex; gap: 0.3rem; flex-wrap: wrap; }
        .admin-action-btns button { font-size: 0.72rem; padding: 0.3rem 0.6rem; border-radius: var(--radius-xs); }
        .admin-tab-content { max-height: 80vh; overflow-y: auto; }

        /* ========== FINANCIAL ITEMS (NOVO) ========== */
        .financial-item { background: var(--primary-hover); border-radius: var(--radius-sm); padding: 0.8rem 1rem; margin: 0.4rem 0; border: 1px solid var(--primary-border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .financial-item:hover { border-color: var(--primary); }

        /* ========== LOG ITEMS (NOVO) ========== */
        .log-item { background: var(--primary-hover); border-radius: var(--radius-xs); padding: 0.5rem 0.8rem; margin: 0.3rem 0; border: 1px solid var(--primary-border); font-size: 0.78rem; line-height: 1.5; }
        .log-item .log-time { font-family: monospace; font-size: 0.7rem; color: var(--text-muted); }
        .log-item .log-action { font-weight: 700; color: var(--primary); }

        /* ========== MESSAGES SIDEBAR BADGE (NOVO) ========== */
        .messages-badge { background: var(--danger); color: var(--white); font-size: 0.6rem; font-weight: 700; padding: 0.1rem 0.35rem; border-radius: 50%; min-width: 14px; text-align: center; display: inline-block; margin-left: 0.3rem; }

        /* ========== SEND MESSAGE FORM (NOVO) ========== */
        .send-msg-form { background: var(--primary-hover); border-radius: var(--radius-sm); padding: 1rem; border: 1px solid var(--primary-border); margin-top: 0.5rem; }

        /* ========== EDIT ARTIST TAB (NOVO) ========== */
        .edit-artist-section { background: var(--primary-hover); border-radius: var(--radius-sm); padding: 1.2rem; margin: 0.8rem 0; border: 1px solid var(--primary-border); }

const UPLOAD_MAX_RETRIES = 3;

// ================================================================
// [SHARED] 4. CACHE LOCAL PARA UPLOADS
// Evita re-upload do mesmo ficheiro dentro de 7 dias.
// Máximo de 50 itens no cache (LRU implícito).
// O cache é guardado no localStorage do browser.
// ================================================================

const UPLOAD_CACHE_KEY = 'distro_angola_upload_cache';

/**
 * loadUploadCache - Carrega o cache de uploads do localStorage.
 * Retorna objecto vazio se não existir ou houver erro.
 * @returns {Object} Cache de uploads
 */
// [SHARED] Carregar cache de uploads do localStorage
function loadUploadCache() {
  try {
    const cached = localStorage.getItem(UPLOAD_CACHE_KEY);
    return cached ? JSON.parse(cached) : {};
  } catch (e) {
    console.warn('[Cache] Erro ao carregar cache:', e);
    return {};
  }
}

/**
 * saveUploadCache - Guarda o cache de uploads no localStorage.
 * Limita a 50 itens, removendo os mais antigos se exceder.
 * @param {Object} cache - Objecto de cache a guardar
 */
// [SHARED] Guardar cache de uploads no localStorage
function saveUploadCache(cache) {
  try {
    const keys = Object.keys(cache);
    if (keys.length > 50) {
      // Remover entradas mais antigas (primeiras inseridas)
      const oldestKeys = keys.slice(0, keys.length - 50);
      oldestKeys.forEach(key => delete cache[key]);
    }
    localStorage.setItem(UPLOAD_CACHE_KEY, JSON.stringify(cache));
  } catch (e) {
    console.warn('[Cache] Erro ao guardar cache:', e);
  }
}

/**
 * getFileHash - Gera um hash único para o ficheiro baseado em
 * nome, tamanho, data de modificação e tipo MIME.
 * Usado como chave de cache para detectar ficheiros idênticos.
 * @param {File} file - Objecto File do input HTML
 * @returns {string} Hash identificativo do ficheiro
 */
// [SHARED] Gerar hash identificativo do ficheiro
function getFileHash(file) {
  return `${file.name}_${file.size}_${file.lastModified}_${file.type}`;
}

/**
 * uploadParaDrive - Upload com cache local inteligente.
 * Verifica se o ficheiro já foi enviado nos últimos 7 dias.
 * Se sim, reutiliza a URL do cache (sem fazer upload novamente).
 * Se não, faz o upload real e guarda o resultado no cache.
 * 
 * @param {File} file - O objecto File do input HTML
 * @param {string} fileName - Nome do ficheiro a guardar no Drive
 * @param {string} artistaId - UID do artista (Firebase Auth UID)
 * @param {string} artistaNome - Nome artístico do artista
 * @param {string} tipo - Tipo de ficheiro: 'capa', 'audio' ou 'comprovativo'
 * @returns {Promise<string>} URL do ficheiro no Google Drive
 */
// [SHARED] Upload com cache local inteligente
async function uploadParaDrive(file, fileName, artistaId, artistaNome, tipo, lancamentoNome) {
  if (!file) {
    throw new Error('Nenhum ficheiro fornecido');
  }

  // Gerar chave de cache única para este ficheiro + artista + tipo
  const fileHash = getFileHash(file);
  const cacheKey = `${artistaId}_${tipo}_${fileHash}`;
  const cache = loadUploadCache();
  const SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;
  
  // Verificar se existe no cache e se ainda é válido (< 7 dias)
  const cachedItem = cache[cacheKey];
  if (cachedItem && (Date.now() - cachedItem.timestamp) < SEVEN_DAYS) {
    console.log('[Cache] ✅ Reutilizando URL em cache para:', fileName);
    return cachedItem.url;
  }
  
  // Cache miss ou expirado - fazer upload real
  console.log('[Cache] 🔄 Fazendo upload real para:', fileName);
  const url = await uploadParaDriveReal(file, fileName, artistaId, artistaNome, tipo, lancamentoNome);
  
  // Guardar resultado no cache
  cache[cacheKey] = {
    url: url,
    timestamp: Date.now(),
    fileName: fileName,
    tipo: tipo,
    fileSize: file.size
  };
  saveUploadCache(cache);
  
  console.log('[Cache] 💾 URL guardada em cache para:', fileName);
  return url;
}

/**
 * uploadParaDriveReal - Upload real para o Google Drive via Apps Script.
 * Converte o ficheiro para Base64 e envia ao Web App Script que o
 * guarda no Google Drive.
 *
 * CORREÇÃO DE CORS ("Failed to fetch"):
 * O Google Apps Script redireciona (302) POST requests de
 * script.google.com para script.googleusercontent.com. Quando se
 * usa Content-Type: application/json, o browser envia um preflight
 * OPTIONS request, e o redirect causa falha de CORS. A solução é
 * usar Content-Type: text/plain para evitar o preflight request,
 * pois o Apps Script lê e.postData.contents independentemente do
 * Content-Type enviado pelo cliente.
 *
 * Implementa retry com backoff exponencial para lidar com falhas
 * temporárias de rede (timeout, conexão instável, etc.).
 *
 * @param {File} file - O objecto File do input HTML
 * @param {string} fileName - Nome do ficheiro a guardar no Drive
 * @param {string} artistaId - UID do artista (Firebase Auth UID)
 * @param {string} artistaNome - Nome artístico do artista
 * @param {string} tipo - Tipo de ficheiro: 'capa', 'audio' ou 'comprovativo'
 * @returns {Promise<string>} URL do ficheiro no Google Drive
 */
// [SHARED] Upload real para Google Drive via Apps Script (com fix CORS + retry)
async function uploadParaDriveReal(file, fileName, artistaId, artistaNome, tipo, lancamentoNome) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = async () => {
      try {
        const base64 = reader.result.split(',')[1];

        // Payload com os dados do ficheiro para o Apps Script
        const payload = {
          acao: 'upload_ficheiro',
          fileBase64: base64,
          fileName: fileName,
          mimeType: file.type,
          artistaId: artistaId,
          artistaNome: artistaNome,
          lancamentoNome: lancamentoNome || null,
          tipo: tipo,
          folderId: GOOGLE_DRIVE_FOLDER_ID
        };

        let lastError = null;

        // Retry com backoff exponencial para lidar com falhas temporárias
        for (let attempt = 1; attempt <= UPLOAD_MAX_RETRIES; attempt++) {
          try {
            console.log('[Upload] Tentativa ' + attempt + '/' + UPLOAD_MAX_RETRIES + ' para:', fileName);

            const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
              method: 'POST',
              // CORREÇÃO CORS: Usar text/plain para evitar preflight request.
              // O Apps Script lê e.postData.contents independentemente
              // do Content-Type, por isso text/plain funciona corretamente
              // e evita o erro "Failed to fetch" causado pelo redirect 302.
              headers: { 'Content-Type': 'text/plain' },
              body: JSON.stringify(payload)
            });

            if (!response.ok) {
              throw new Error('HTTP ' + response.status + ': ' + response.statusText);
            }

            const result = await response.json();

            if (result.success) {
              console.log('[Upload] ✅ Ficheiro enviado ao Drive:', fileName, result.data.fileUrl);
              resolve(result.data.fileUrl);
              return; // Sucesso - sair da função
            } else {
              throw new Error(result.message || 'Erro desconhecido no upload para Google Drive');
            }
          } catch (attemptError) {
            lastError = attemptError;
            const isFetchError = attemptError.message && (
              attemptError.message.includes('Failed to fetch') ||
              attemptError.message.includes('NetworkError') ||
              attemptError.message.includes('Load failed') ||
              attemptError.message.includes('net::')
            );

            if (attempt < UPLOAD_MAX_RETRIES && isFetchError) {
              // Backoff exponencial: 1s, 2s, 4s...
              const delay = UPLOAD_RETRY_BASE_DELAY * Math.pow(2, attempt - 1);
              console.warn('[Upload] ⚠️ Tentativa ' + attempt + ' falhou (' + attemptError.message + '). Retry em ' + delay + 'ms...');
              await new Promise(r => setTimeout(r, delay));
            } else {
              // Última tentativa ou erro não-recuperável
              break;
            }
          }
        }

        // Todas as tentativas falharam
        console.error('[Upload] ❌ Todas as tentativas falharam para:', fileName, lastError);
        reject(lastError || new Error('Erro desconhecido no upload para Google Drive'));
      } catch(e) {

/**
 * registarLancamentoNaPlanilha - Regista os dados do lançamento na Google Sheets
 * Envia todos os metadados do lançamento para o Apps Script guardar na planilha.
 *
 * CORREÇÃO CORS: Usa Content-Type: text/plain (mesmo fix do uploadParaDriveReal)
 * para evitar o erro "Failed to fetch" causado pelo redirect 302 do Apps Script.
 *
 * NOTA: Esta função é NÃO-BLOQUEANTE - se a planilha falhar, o lançamento
 * continua a ser guardado no Firestore. A planilha serve apenas como backup
 * visual para o administrador.
 *
 * @param {Object} dadosLancamento - Objecto com todos os dados do formulário
 * @param {string} coverUrl - URL da capa no Google Drive
 * @param {Array<string>} audioUrls - Array de URLs dos áudios no Google Drive
 * @param {string|null} comprovativoUrl - URL do comprovativo (opcional)
 * @returns {Promise<Object>} Resultado da operação
 */
// [SHARED] Registar lançamento na Google Sheets via Apps Script (com fix CORS)
async function registarLancamentoNaPlanilha(dadosLancamento, coverUrl, audioUrls, comprovativoUrl = null) {
    const payload = {
        acao: 'salvar_lancamento',
        artistaId: currentUser.uid,
        artistaNome: userProfile.artisticName,
        artistaEmail: currentUser.email,
        titulo: dadosLancamento.mainTitle,
        artistaPrincipal: dadosLancamento.mainArtist,
        genero: dadosLancamento.genre,
        subgenero: dadosLancamento.subgenre || '',
        idioma: dadosLancamento.language,
        tipo: dadosLancamento.type,
        plataformas: dadosLancamento.platforms,
        status: 'Em analise',
        coverUrl: coverUrl,
        audioUrls: audioUrls,
        produtor: dadosLancamento.producer,
        compositor: dadosLancamento.composer,
        letrista: dadosLancamento.lyricist || '',
        featuring: dadosLancamento.featuring || '',
        hasLyrics: dadosLancamento.hasLyrics,
        lyrics: dadosLancamento.lyrics || '',
        explicito: dadosLancamento.explicit,
        label: dadosLancamento.label || '',
        copyrightText: dadosLancamento.copyrightText || '',
        copyrightP: dadosLancamento.copyrightP || '',
        dataCriacao: dadosLancamento.creationDate || '',
        dataLancamento: dadosLancamento.releaseDate || '',
        dataPresave: dadosLancamento.presaveDate || '',
        infoAdicional: dadosLancamento.additionalInfo || '',
        comprovativoUrl: comprovativoUrl || '',
        hasSample: dadosLancamento.hasSample || false,
        hasInstrumental: dadosLancamento.hasInstrumental || false,
        isRemix: dadosLancamento.isRemix || false,
        numFaixas: audioUrls.length
    };

    try {
        // Retry com backoff exponencial (mesma lógica do uploadParaDriveReal)
        let lastError = null;
        for (let attempt = 1; attempt <= UPLOAD_MAX_RETRIES; attempt++) {
            try {
                const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    // CORREÇÃO CORS: text/plain evita preflight request
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                  throw new Error('HTTP ' + response.status + ': ' + response.statusText);
                }

                const result = await response.json();
                if (result.success) {
                    console.log('[DISTRO ANGOLA] Lançamento registado na planilha:', dadosLancamento.mainTitle);
                } else {
                    console.warn('[DISTRO ANGOLA] Aviso: Lançamento NÃO registado na planilha:', result.message);
                }
                return result;
            } catch (attemptError) {
                lastError = attemptError;
                const isFetchError = attemptError.message && (
                    attemptError.message.includes('Failed to fetch') ||
                    attemptError.message.includes('NetworkError') ||
                    attemptError.message.includes('Load failed') ||
                    attemptError.message.includes('net::')
                );
                if (attempt < UPLOAD_MAX_RETRIES && isFetchError) {
                    const delay = UPLOAD_RETRY_BASE_DELAY * Math.pow(2, attempt - 1);
                    console.warn('[Planilha] Tentativa ' + attempt + ' falhou. Retry em ' + delay + 'ms...');
                    await new Promise(r => setTimeout(r, delay));
                } else {
                    break;
                }
            }
        }
        // Não bloquear o fluxo principal se a planilha falhar
        console.warn('[DISTRO ANGOLA] Aviso: Erro ao registar na planilha (não bloqueante):', lastError);
        return { success: false, message: lastError?.message || 'Erro desconhecido' };
    } catch(e) {
        // Não bloquear o fluxo principal se a planilha falhar
        console.warn('[DISTRO ANGOLA] Aviso: Erro ao registar na planilha (não bloqueante):', e);
        return { success: false, message: e.message };
    }
}

/**
 * notificarAdminEmailVerificado()
 *
 * Envia uma notificação por email ao administrador quando um artista
 * verifica o email. Esta função é chamada nos momentos exatos em que
 * o sistema detecta que o email foi verificado:
 *
 *   1. Dentro de doLogin() - após login com email já verificado
 *   2. Dentro de onAuthStateChanged() - quando o estado de auth muda
 *   3. No botão "Já verifiquei" - quando o artista confirma manualmente
 *
 * O email contém:
 *   - Nome artístico do artista
 *   - Email do artista
 *   - Links para redes sociais (Facebook, Instagram, YouTube)
 *   - Aviso de que o artista aguarda aprovação manual
 *
 * IMPORTANTE:
 *   - A função nunca bloqueia o fluxo principal (try/catch silencioso)
 *   - Falhas são registadas no console mas não impedem o login
 *   - O email só é enviado quando o Firestore é atualizado, evitando duplicações
 *
 * @param {object} profile - Objeto userProfile do Firestore
 * @param {string} uid - UID do utilizador no Firebase Auth
 */
// [SHARED] Notificar admin sobre verificação de email
async function notificarAdminEmailVerificado(profile, uid) {
    try {
        const nomeArtistico = profile?.artisticName || 'Desconhecido';
        const emailArtista = profile?.email || 'N/A';
        const facebook = profile?.facebook || '';
        const instagram = profile?.instagram || '';
        const youtube = profile?.youtube || '';
        const soundcloud = profile?.soundcloud || '';
        const accountType = profile?.accountType || 'N/A';

        // Construir links de redes sociais (apenas se existirem)
        const linksSociais = [];
        if (facebook) linksSociais.push('Facebook: ' + facebook);
        if (instagram) linksSociais.push('Instagram: ' + instagram);
        if (youtube) linksSociais.push('YouTube: ' + youtube);
        if (soundcloud) linksSociais.push('SoundCloud: ' + soundcloud);

        const assunto = '✅ Email verificado - ' + nomeArtistico;
        const mensagem = [
            '=== NOTIFICAÇÃO: EMAIL VERIFICADO ===',
            '',
            'Nome artístico: ' + nomeArtistico,
            'Email: ' + emailArtista,
            'Tipo de conta: ' + accountType,
            'UID: ' + (uid || 'N/A'),
            '',
            '--- Redes Sociais ---',
            linksSociais.length > 0 ? linksSociais.join('\n') : 'Nenhuma rede social registada',
            '',
            '--- Ação Necessária ---',
            'Este artista verificou o email e AGUARDA aprovação manual.',
            'Acesse o painel de administração para aprovar ou rejeitar a conta.',
            '',
            'Data da verificação: ' + new Date().toLocaleString('pt-AO', { timeZone: 'Africa/Luanda' })
        ].join('\n');

        await enviarEmail(assunto, mensagem);
        console.log("[DISTRO ANGOLA] Notificação de email verificado enviada para:", nomeArtistico);
    } catch(e) {
        // Falha no envio NÃO deve bloquear o fluxo do utilizador
        console.error("[DISTRO ANGOLA] Erro ao notificar admin sobre email verificado:", e?.message || e);
    }
}

prepareArtistUpdates(pr){const u={};Object.entries(pr.artistStats).forEach(([k,d])=>{const nn=(d.name||'').trim();const ne=(d.email||'').trim();if(!nn&&!ne)return;u[k]={artisticName:nn,email:ne,streams:d.streams,revenue:d.revenue,revenueAOA:d.revenueAOA||this.parser.convertToAOA(d.revenue,this.parser.platformCurrencies[pr.platform]||'USD'),platform:pr.platform,trackBreakdown:Object.values(d.tracks).map(t=>({name:t.name,streams:t.streams,revenue:t.revenue,revenueAOA:t.revenueAOA||this.parser.convertToAOA(t.revenue,this.parser.platformCurrencies[pr.platform]||'USD')}))}});return u}
async applyArtistUpdates(au,platform){let batch=this.fs.batch();let bc=0;const MAX=450;const res={updated:0,notFound:0,notFoundNames:[],details:[]};for(const[k,data]of Object.entries(au)){try{let ud=null,uid=null,userData=null;if(data.email){const eq=await this.fs.collection('users').where('email','==',data.email).limit(1).get();if(!eq.empty){ud=eq.docs[0];uid=ud.id;userData=ud.data()}}if(!uid&&data.artisticName){const nq=await this.fs.collection('users').where('artisticName','==',data.artisticName).limit(1).get();if(!nq.empty){ud=nq.docs[0];uid=ud.id;userData=ud.data()}}if(!uid){res.notFound++;res.notFoundNames.push(data.artisticName||data.email||k);continue}const cs=userData.totalStreams||0;const cb=userData.balance||0;const ns=cs+data.streams;const nb=cb+data.revenueAOA;const upData={totalStreams:ns,balance:nb,lastUpdatedStats:firebase.firestore.FieldValue.serverTimestamp()};const pk=this.parser.getPlatformKey(platform);const cps=userData.platformStats||{};const cpd=cps[pk]||{streams:0,revenue:0};upData['platformStats.'+pk]={streams:cpd.streams+data.streams,revenue:cpd.revenue+data.revenueAOA,lastImport:new Date().toISOString(),platform:platform};batch.update(this.fs.collection('users').doc(uid),upData);bc++;const shr=this.fs.collection('users').doc(uid).collection('statsHistory').doc();batch.set(shr,{platform:platform,streams:data.streams,revenue:data.revenueAOA,trackBreakdown:data.trackBreakdown,importedAt:new Date().toISOString(),source:'csv_import',fileName:''});bc++;res.updated++;res.details.push({userId:uid,artisticName:data.artisticName,email:data.email,streamsAdded:data.streams,revenueAdded:data.revenueAOA,newTotalStreams:ns,newTotalBalance:nb});if(bc>=MAX){await batch.commit();batch=this.fs.batch();bc=0}}catch(e){console.error('Erro ao atualizar artista:',e)}}if(bc>0)await batch.commit();return res}
async saveImportRecord(pr,fileName,ur){const c=this.parser.platformCurrencies[pr.platform]||'USD';const rec={fileName:fileName,platform:pr.platform,totalRecords:pr.totalRecords,totalStreams:pr.totalStreams,totalRevenue:pr.totalRevenue,totalRevenueAOA:pr.totalRevenueAOA,currency:c,artistsUpdated:ur.updated,artistsNotFound:ur.notFound,notFoundNames:ur.notFoundNames||[],status:'completed',importedAt:firebase.firestore.FieldValue.serverTimestamp(),artistBreakdown:Object.entries(pr.artistStats).map(([k,d])=>({name:d.name,email:d.email||'',streams:d.streams,revenue:d.revenue})),trackCount:Object.keys(pr.trackStats).length};const dr=await this.fs.collection('statsImports').add(rec);return{id:dr.id,...rec}}
async notifyUpdatedArtists(ur,platform){const pn=this.parser.getPlatformDisplayName(this.parser.getPlatformKey(platform));for(const d of(ur.details||[])){try{await this.fs.collection('users').doc(d.userId).collection('notifications').add({msg:'Estatisticas de '+pn+' atualizadas! +'+d.streamsAdded.toLocaleString()+' streams, +'+this.formatCurrency(d.revenueAdded)+' em royalties.',time:new Date().toISOString(),read:false,type:'stats_update',relatedId:d.userId})}catch(e){}}}
async loadImportHistory(limit=20){try{const s=await this.fs.collection('statsImports').orderBy('importedAt','desc').limit(limit).get();this.importHistoryCache=s.docs.map(d=>({id:d.id,...d.data()}));return this.importHistoryCache}catch(e){try{const s=await this.fs.collection('statsImports').limit(limit).get();this.importHistoryCache=s.docs.map(d=>({id:d.id,...d.data()}));this.importHistoryCache.sort((a,b)=>{const da=a.importedAt?.toDate?a.importedAt.toDate():new Date(a.importedAt||0);const db=b.importedAt?.toDate?b.importedAt.toDate():new Date(b.importedAt||0);return db-da});return this.importHistoryCache}catch(e2){return[]}}}
async loadGlobalStats(){try{const s=await this.fs.collection('users').where('status','==','approved').get();let ta=0,ts=0,tr=0,trl=0;const pt={};s.docs.forEach(d=>{const data=d.data();ta++;ts+=data.totalStreams||0;tr+=data.balance||0;trl+=data.releaseCount||0;const ps=data.platformStats||{};Object.entries(ps).forEach(([k,v])=>{if(!pt[k])pt[k]={streams:0,revenue:0};pt[k].streams+=v.streams||0;pt[k].revenue+=v.revenue||0})});return{totalArtists:ta,totalStreams:ts,totalRevenue:tr,totalReleases:trl,platformTotals:pt}}catch(e){return{totalArtists:0,totalStreams:0,totalRevenue:0,totalReleases:0,platformTotals:{}}}}
async setArtistBalance(uid,amount,reason){await this.fs.collection('users').doc(uid).update({balance:amount,lastBalanceUpdate:firebase.firestore.FieldValue.serverTimestamp(),lastBalanceUpdateReason:reason||'Ajuste manual pelo admin'});await this.fs.collection('users').doc(uid).collection('notifications').add({msg:'Saldo atualizado: '+this.formatCurrency(amount)+'. Motivo: '+(reason||'Ajuste administrativo'),time:new Date().toISOString(),read:false,type:'balance_update',relatedId:uid})}
async addToArtistBalance(uid,amount,reason){await this.fs.collection('users').doc(uid).update({balance:firebase.firestore.FieldValue.increment(amount),lastBalanceUpdate:firebase.firestore.FieldValue.serverTimestamp(),lastBalanceUpdateReason:reason||'Adicao pelo admin'})}
formatNumber(n){if(n===null||n===undefined||isNaN(n))return'0';if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toLocaleString('pt-AO')}
formatCurrency(v){if(v===null||v===undefined||isNaN(v))return'0,00 Kz';return Number(v).toLocaleString('pt-AO',{minimumFractionDigits:2,maximumFractionDigits:2})+' Kz'}}

async loadArtistStats(userId){if(!this.fs||!userId)return this.statsCache||{totalStreams:0,balance:0,platformStats:{},releaseCount:0,plan:'FREE'};try{const doc=await this.fs.collection('users').doc(userId).get();if(!doc.exists)return null;const d=doc.data();this.statsCache={totalStreams:d.totalStreams||0,balance:d.balance||0,lastUpdated:d.lastUpdatedStats||null,platformStats:d.platformStats||{},releaseCount:d.releaseCount||0,plan:d.plan||'FREE',artisticName:d.artisticName||'',email:d.email||'',status:d.status||'pending'};return this.statsCache}catch(e){return this.statsCache||{totalStreams:0,balance:0,platformStats:{},releaseCount:0,plan:'FREE'}}}

async loadEarningsDetail(userId){if(!this.fs||!userId)return{totalBalance:0,totalStreams:0,platformEarnings:{},trackEarnings:[],recentImports:[]};try{const[stats,history]=await Promise.all([this.loadArtistStats(userId),this.loadStatsHistory(userId)]);const pe={};if(stats&&stats.platformStats)Object.entries(stats.platformStats).forEach(([k,d])=>{pe[k]={streams:d.streams||0,revenue:d.revenue||0,revenueFormatted:this.formatCurrency(d.revenue||0),lastImport:d.lastImport||null,displayName:this.getPlatformDisplayName(k)}});const te={};history.forEach(h=>{if(h.trackBreakdown&&Array.isArray(h.trackBreakdown))h.trackBreakdown.forEach(t=>{const k=(t.name||'').toLowerCase().trim();if(!k)return;if(!te[k])te[k]={name:t.name,streams:0,revenue:0};te[k].streams+=t.streams||0;te[k].revenue+=t.revenueAOA||t.revenue||0})});const st=Object.values(te).sort((a,b)=>b.revenue-a.revenue);this.earningsCache={totalBalance:stats?stats.balance:0,totalStreams:stats?stats.totalStreams:0,platformEarnings:pe,trackEarnings:st,recentImports:history.slice(0,10)};return this.earningsCache}catch(e){return{totalBalance:0,totalStreams:0,platformEarnings:{},trackEarnings:[],recentImports:[]}}}
renderStatsCards(stats){if(!stats)stats={totalStreams:0,balance:0,platformStats:{},releaseCount:0};const pc=Object.entries(stats.platformStats||{}).length;let lut='Sem dados importados ainda';if(stats.lastUpdated){try{const lu=stats.lastUpdated.toDate?stats.lastUpdated.toDate():new Date(stats.lastUpdated);lut='Ultima atualizacao: '+lu.toLocaleDateString('pt-AO')}catch(e){lut='Data indisponivel'}}return'<div class="stats-grid"><div class="stat-card"><h4>Total Streams</h4><div class="stat-value">'+this.formatNumber(stats.totalStreams||0)+'</div></div><div class="stat-card" style="background:linear-gradient(135deg,#e63946,#ff6b6b);"><h4>Saldo (Kz)</h4><div class="stat-value">'+this.formatNumber(stats.balance||0)+'</div></div><div class="stat-card" style="background:linear-gradient(135deg,#2d6a4f,#40916c);"><h4>Lancamentos</h4><div class="stat-value">'+(stats.releaseCount||0)+'</div></div><div class="stat-card" style="background:linear-gradient(135deg,#e07c24,#f4a261);"><h4>Plataformas</h4><div class="stat-value">'+pc+'</div></div></div><p style="font-size:0.75rem;color:var(--text-muted);text-align:center;margin-top:0.5rem;">'+escapeHTML(lut)+'</p>'}
renderPlatformBreakdown(ps){if(!ps||!Object.keys(ps).length)return'<p style="color:var(--text-muted);text-align:center;padding:1.5rem 0;">Nenhuma estatistica por plataforma ainda.</p>';let h='<div class="platform-breakdown-list">';Object.entries(ps).forEach(([k,d])=>{const n=this.getPlatformDisplayName(k);const s=d.streams||0;const r=d.revenue||0;const p=this.calculatePercentage(s,ps);h+='<div class="release-item" style="display:flex;justify-content:space-between;align-items:center;"><div><strong>'+escapeHTML(n)+'</strong><br><small style="color:var(--text-muted);">'+this.formatNumber(s)+' streams</small></div><div style="text-align:right;"><div style="font-weight:700;color:var(--primary);">'+this.formatCurrency(r)+'</div><div style="width:80px;height:6px;background:var(--primary-border);border-radius:3px;margin-top:4px;"><div style="width:'+p+'%;height:100%;background:var(--primary);border-radius:3px;"></div></div></div></div>'});h+='</div>';return h}
renderTopTracks(tracks,limit=5){if(!tracks||!tracks.length)return'<p style="color:var(--text-muted);text-align:center;padding:1rem 0;">Sem dados de faixas</p>';const tt=tracks.slice(0,limit);let h='<div class="track-stats-list">';tt.forEach((t,i)=>{h+='<div class="release-item" style="display:flex;align-items:center;gap:0.8rem;"><div style="width:28px;height:28px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;">'+(i+1)+'</div><div style="flex:1;min-width:0;"><strong style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escapeHTML(t.name||'Faixa desconhecida')+'</strong><small style="color:var(--text-muted);">'+this.formatNumber(t.streams||0)+' streams</small></div><div style="text-align:right;flex-shrink:0;"><span style="font-weight:600;color:var(--primary);">'+this.formatCurrency(t.revenue||0)+'</span></div></div>'});h+='</div>';return h}
renderRecentHistory(history){if(!history||!history.length)return'<p style="color:var(--text-muted);text-align:center;padding:1rem 0;">Nenhuma atualizacao registada</p>';let h='<div class="history-list">';history.slice(0,10).forEach(x=>{const d=x.importedAt?new Date(x.importedAt):new Date();const pn=this.getPlatformDisplayName(x.platform||'other');h+='<div class="release-item" style="padding:0.7rem 1rem;"><div class="flex-between"><div><strong style="font-size:0.85rem;">'+escapeHTML(pn)+'</strong><br><small style="color:var(--text-muted);">+'+this.formatNumber(x.streams||0)+' streams</small></div><div style="text-align:right;"><span style="font-weight:600;color:#2d6a4f;font-size:0.85rem;">+'+this.formatCurrency(x.revenue||0)+'</span><br><small style="color:var(--text-muted);">'+d.toLocaleDateString('pt-AO')+'</small></div></div></div>'});h+='</div>';return h}
getPlatformDisplayName(k){const n={'spotify':'Spotify','appleMusic':'Apple Music','deezer':'Deezer','boomplay':'Boomplay','youtubeMusic':'YouTube Music','amazonMusic':'Amazon Music','tidal':'Tidal','anghami':'Anghami','tiktok':'TikTok','meta':'Meta (FB/IG)','other':'Outras','pandora':'Pandora'};return n[k]||k}
calculatePercentage(s,ps){let t=0;Object.values(ps).forEach(p=>{t+=p.streams||0});return t===0?0:Math.round((s/t)*100)}
formatNumber(n){if(n===null||n===undefined||isNaN(n))return'0';if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toLocaleString('pt-AO')}
formatCurrency(v){if(v===null||v===undefined||isNaN(v))return'0,00 Kz';return Number(v).toLocaleString('pt-AO',{minimumFractionDigits:2,maximumFractionDigits:2})+' Kz'}}

// [SHARED] Anti-XSS — Escapar HTML para prevenir injeção
function escapeHTML(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(String(str)));
    return div.innerHTML;
}
// [SHARED] Anti-XSS — Sanitizar atributos HTML
function sanitizeAttr(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"']/g, function(m) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
    });
}

// [SHARED] Adicionar notificação ao utilizador actual
async function addNotification(msg, type, relatedId) {
    if (!currentUser) return;
    const notif = { msg, time: new Date().toISOString(), read: false };
    if (type) notif.type = type;
    if (relatedId) notif.relatedId = relatedId;
    notifList.unshift(notif);
    if (notifList.length > 50) notifList.pop();
    try {
        if (fs && currentUser) await fs.collection("users").doc(currentUser.uid).collection("notifications").add(notif);
    } catch(e) { console.warn("Notif save error:", e); }
    render();
}

    if (!fs || !currentUser) return;

        const snap = await fs.collection("users").doc(currentUser.uid).collection("notifications").orderBy("time","desc").limit(50).get();

// [USER] Criar novo ticket de suporte
async function sendTicket(subject, message) {
    const ticketData = {
        subject,
        messages: [{ text: message, sender: "user", timestamp: new Date().toISOString() }],
        status: "open",
        createdAt: Date.now(),
        updatedAt: Date.now()
    };
    const docRef = await fs.collection("users").doc(currentUser.uid).collection("tickets").add(ticketData);
    try {
        await fs.collection("globalTickets").doc(docRef.id).set({
            ...ticketData,
            userId: currentUser.uid,
            userEmail: currentUser.email || "",
            userName: userProfile?.artisticName || ""
        });
    } catch(e) { console.warn("Erro ao salvar globalTicket:", e); }
    await addNotification('Ticket "' + subject + '" criado. Aguarde resposta.', 'ticket', docRef.id);
    await enviarEmail("Novo ticket", "Assunto: " + subject + "\nMensagem: " + message + "\nUsuario: " + currentUser.email + "\nNome artistico: " + (userProfile?.artisticName || "N/A"));
    await loadTickets();
    currentTicketId = docRef.id;
    currentTicketOwnerId = null;
    render();
}

// [USER] Enviar resposta num ticket
async function sendReply(ticketId, message) {
    const ticketRef = fs.collection("users").doc(currentUser.uid).collection("tickets").doc(ticketId);
    const ticketDoc = await ticketRef.get();
    if (!ticketDoc.exists) return;
    const ticket = ticketDoc.data();
    const messages = ticket.messages || [];
    messages.push({ text: message, sender: "user", timestamp: new Date().toISOString() });
    await ticketRef.update({ messages, updatedAt: Date.now() });
    try {
        await fs.collection("globalTickets").doc(ticketId).update({ messages, updatedAt: Date.now() });
    } catch(e) { console.warn("Erro ao atualizar globalTicket:", e); }
    await enviarEmail("Resposta no ticket", "Assunto: " + (ticket.subject || "N/A") + "\nUsuario: " + (currentUser.email || "N/A") + "\nMensagem: " + message);
    await loadTickets();
    render();
}

// [ADMIN] Carregar todos os tickets globais
async function loadAllTicketsForAdmin() {
    if (!isAdmin) return [];
    try {
        const snapshot = await fs.collection("globalTickets").orderBy("createdAt", "desc").get();
        const tickets = [];
        snapshot.docs.forEach(doc => {
            const data = doc.data();
            tickets.push({ id: doc.id, userId: data.userId || "", userEmail: data.userEmail || "", userName: data.userName || "", ...data });
        });
        adminTicketsList = tickets;
        if (currentView === "adminDashboard") render();
        return tickets;
    } catch (err) {
        console.error("Erro ao carregar tickets globais:", err);
        try {
            const snapshot = await fs.collection("globalTickets").get();
            const tickets = [];
            snapshot.docs.forEach(doc => {
                const data = doc.data();
                tickets.push({ id: doc.id, userId: data.userId || "", userEmail: data.userEmail || "", userName: data.userName || "", ...data });
            });
            tickets.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            adminTicketsList = tickets;
            if (currentView === "adminDashboard") render();
            return tickets;
        } catch (err2) {
            console.error("Erro no fallback de tickets:", err2);
            return [];
        }
    }
}

// [ADMIN] Responder a ticket como admin
async function adminReplyToTicket(userId, ticketId, message) {
    if (!isAdmin) throw new Error("Acesso negado");
    const ticketRef = fs.collection("users").doc(userId).collection("tickets").doc(ticketId);
    const ticketDoc = await ticketRef.get();
    if (!ticketDoc.exists) throw new Error("Ticket nao encontrado");
    const ticket = ticketDoc.data();
    const messages = ticket.messages || [];
    messages.push({ text: message, sender: "admin", timestamp: new Date().toISOString() });
    await ticketRef.update({ messages, updatedAt: Date.now(), status: "answered" });
    try {
        await fs.collection("globalTickets").doc(ticketId).update({ messages, updatedAt: Date.now(), status: "answered" });
    } catch(e) { console.warn("Erro ao atualizar globalTicket:", e); }
    await fs.collection("users").doc(userId).collection("notifications").add({
        msg: 'Resposta do suporte ao ticket "' + ticket.subject + '"',
        time: new Date().toISOString(),
        read: false,
        type: 'ticket',
        relatedId: ticketId
    });
    await enviarEmail("Resposta do admin no ticket", "Ticket: " + (ticket.subject || "N/A") + "\nUsuario ID: " + userId + "\nResposta: " + message);
    // Enviar notificação push ao utilizador

/** Carrega mensagens do utilizador autenticado */
// [SHARED] Carregar mensagens do utilizador autenticado
async function loadUserMessages() {
    if (!fs || !currentUser) return;
    try {
        const snap = await fs.collection("users").doc(currentUser.uid).collection("messages")
            .orderBy("createdAt", "desc").limit(50).get();
        messagesCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        unreadMessagesCount = messagesCache.filter(m => !m.read).length;
    } catch (e) {
        console.warn("Load messages error:", e);
        try {
            const snap = await fs.collection("users").doc(currentUser.uid).collection("messages").limit(50).get();
            messagesCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            messagesCache.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            unreadMessagesCount = messagesCache.filter(m => !m.read).length;
        } catch (e2) { console.warn("Load messages fallback error:", e2); }
    }
}

/** Marca uma mensagem como lida e regista data/hora de leitura */
// [SHARED] Marcar mensagem como lida
async function markMessageRead(msgId) {
    if (!fs || !currentUser) return;
    try {
        const readAtVal = Date.now();
        // Atualizar na subcoleção do utilizador
        await fs.collection("users").doc(currentUser.uid).collection("messages").doc(msgId).update({ read: true, readAt: readAtVal });
        // Sincronizar com globalMessages para o admin ver o status
        try {
            await fs.collection("globalMessages").doc(msgId).update({ read: true, readAt: readAtVal });
        } catch (syncErr) {
            console.warn("Sync read status to globalMessages error:", syncErr);
        }
        // Atualizar cache local
        const msg = messagesCache.find(m => m.id === msgId);
        if (msg) { msg.read = true; msg.readAt = readAtVal; unreadMessagesCount = Math.max(0, unreadMessagesCount - 1); }
        // Atualizar cache do admin se existir
        const adminMsg = adminMessagesList.find(m => m.id === msgId);
        if (adminMsg) { adminMsg.read = true; adminMsg.readAt = readAtVal; }
        render();
    } catch (e) { console.warn("Mark message read error:", e); }
}

// ================================================================
// [SHARED] 10. NOTIFICAÇÕES PUSH - Firebase Cloud Messaging (FCM)
// ================================================================

/**
 * Inicializar Notificações Push (FCM)
 *
 * Fluxo:
 * 1. Registar o Service Worker (firebase-messaging-sw.js)
 * 2. Pedir permissão ao utilizador (Notification.requestPermission)
 * 3. Obter o token FCM do dispositivo
 * 4. Guardar o token no Firestore (users/{uid}/fcmToken)
 * 5. Configurar o ouvinte onMessage() para notificações em primeiro plano
 *
 * Esta função é chamada automaticamente após o login do utilizador.
 */
// [SHARED] Inicializar notificações push (FCM)
async function initPushNotifications() {
    // Verificar se o Firebase Messaging está disponível
    if (!messaging) {
        console.warn("[FCM] Firebase Messaging não está disponível");
        return false;
    }

    // Verificar se o Service Worker é suportado
    if (!('serviceWorker' in navigator)) {
        console.warn("[FCM] Service Worker não suportado neste browser");
        return false;
    }

    // Verificar se as notificações são suportadas
    if (!('Notification' in window)) {
        console.warn("[FCM] Notificações não suportadas neste browser");
        return false;
    }

    try {
        // ============================================================
        // PASSO 1: Registar o Service Worker (PWA + FCM consolidado)
        // O sw.js substitui o antigo firebase-messaging-sw.js,
        // combinando cache offline PWA com notificações push FCM.
        // ============================================================
        let swRegistration = null;
        try {
            // Verificar se já está registado
            const existingReg = await navigator.serviceWorker.getRegistration('./firebase-messaging-sw.js');
            if (existingReg) {
                swRegistration = existingReg;
                console.log("[PWA+FCM] Service Worker já registado");
            } else {
                swRegistration = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
                console.log("[PWA+FCM] Service Worker registado com sucesso");
            }
        } catch (swErr) {
            console.warn("[PWA+FCM] Erro ao registar Service Worker:", swErr);
            try {
                swRegistration = await navigator.serviceWorker.register('/app/firebase-messaging-sw.js');
                console.log("[PWA+FCM] Service Worker registado (caminho alternativo)");
            } catch (swErr2) {
                console.error("[PWA+FCM] Falha ao registar Service Worker:", swErr2);
                return false;
            }
        }

        // ============================================================
        // PASSO 2: Verificar estado da permissão
        // ============================================================
        pushPermissionStatus = Notification.permission;

        if (pushPermissionStatus === 'denied') {
            console.warn("[FCM] Permissão de notificação negada pelo utilizador");
            return false;
        }

        // Se ainda não foi pedido, pedir permissão
        if (pushPermissionStatus === 'default') {
            const permission = await Notification.requestPermission();
            pushPermissionStatus = permission;

            if (permission !== 'granted') {
                console.warn("[FCM] Permissão de notificação não concedida:", permission);
                return false;
            }
        }

        // Se já foi concedida, verificar se o token já está guardado no Firestore
        if (pushPermissionStatus === 'granted' && currentUser && fs) {
            try {
                const userDoc = await fs.collection("users").doc(currentUser.uid).get();
                if (userDoc.exists && userDoc.data().fcmToken) {
                    console.log("[FCM] Token já existe no Firestore, forçar refresh...");
                    // Forçar refresh do token para garantir que está atualizado
                }
            } catch (e) { /* continuar */ }
        }

        // ============================================================
        // PASSO 3: Obter o token FCM
        // ============================================================
        if (FCM_VAPID_KEY === 'SUA_VAPID_KEY_AQUI') {
            console.warn("[FCM] VAPID Key não configurada. Substitua FCM_VAPID_KEY pela chave do Firebase Console.");
            return false;
        }

        try {
            fcmToken = await messaging.getToken({
                vapidKey: FCM_VAPID_KEY,
                serviceWorkerRegistration: swRegistration
            });

            if (fcmToken) {
                console.log("[FCM] Token obtido:", fcmToken.substring(0, 20) + '...');
                pushNotificationsEnabled = true;

                // ========================================================
                // PASSO 4: Guardar token no Firestore
                // ========================================================
                if (currentUser && fs) {
                    try {
                        await fs.collection("users").doc(currentUser.uid).update({
                            fcmToken: fcmToken,
                            fcmTokenUpdatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                            fcmPlatform: navigator.userAgent ? navigator.userAgent.substring(0, 200) : 'web'
                        });
                        console.log("[FCM] Token guardado no Firestore");
                    } catch (e) {
                        // Se o documento não tiver o campo fcmToken, usar set com merge
                        try {
                            await fs.collection("users").doc(currentUser.uid).set({
                                fcmToken: fcmToken,
                                fcmTokenUpdatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                                fcmPlatform: navigator.userAgent ? navigator.userAgent.substring(0, 200) : 'web'
                            }, { merge: true });
                            console.log("[FCM] Token guardado no Firestore (merge)");
                        } catch (e2) {
                            console.warn("[FCM] Erro ao guardar token no Firestore:", e2);
                        }
                    }
                }
            } else {
                console.warn("[FCM] Não foi possível obter o token FCM");
                return false;
            }
        } catch (tokenErr) {
            console.error("[FCM] Erro ao obter token FCM:", tokenErr);
            return false;
        }

        // ============================================================
        // PASSO 5: Configurar ouvinte onMessage (primeiro plano)
        // ============================================================
        // Quando a app está em primeiro plano, as notificações NÃO são
        // mostradas automaticamente. Precisamos interceptá-las e exibi-las.
        messaging.onMessage((payload) => {
            console.log("[FCM] Notificação recebida em primeiro plano:", payload);

            const title = payload.notification?.title || 'DISTRO ANGOLA';
            const body = payload.notification?.body || 'Você tem uma nova notificação';
            const data = payload.data || {};

            // Mostrar notificação com SweetAlert2 (consistente com o design)
            Swal.fire({
                title: title,
                html: '<div style="text-align:center;">' +
                    '<p style="font-size:0.9rem;">' + escapeHTML(body) + '</p>' +
                    '</div>',
                icon: 'info',
                confirmButtonText: 'OK',
                confirmButtonColor: '#9b4dff',
                timer: 8000,
                timerProgressBar: true,
                toast: false,
                position: 'center'
            });

            // Atualizar contagem de notificações internas
            loadNotifications();
            loadUserMessages();
        });

        // ============================================================
        // PASSO 6: Ouvir alterações no token (refresh)
        // ============================================================
        messaging.onTokenRefresh(async () => {
            console.log("[FCM] Token atualizado, obtendo novo token...");
            try {
                const newToken = await messaging.getToken({ vapidKey: FCM_VAPID_KEY });
                if (newToken && currentUser && fs) {
                    fcmToken = newToken;
                    await fs.collection("users").doc(currentUser.uid).update({
                        fcmToken: newToken,
                        fcmTokenUpdatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    console.log("[FCM] Novo token guardado no Firestore");
                }
            } catch (e) {
                console.error("[FCM] Erro ao atualizar token:", e);
            }
        });

        console.log("[FCM] Notificações push inicializadas com sucesso");
        return true;

    } catch (e) {
        console.error("[FCM] Erro na inicialização de push notifications:", e);
        return false;
    }
}

/**
 * Enviar Notificação Push a um utilizador específico
 *
 * @param {string} userId - ID do utilizador destinatário
 * @param {string} title - Título da notificação
 * @param {string} body - Corpo da mensagem
 * @param {object} data - Dados adicionais (opcional)
 * @returns {Promise<object>} - Resultado do envio
 *
 * Como funciona:
 * 1. Busca o token FCM do utilizador no Firestore (users/{uid}/fcmToken)
 * 2. Envia a notificação via API REST do FCM usando a Server Key
 *
 * NOTA DE SEGURANÇA:
 * Em produção, a chamada à API do FCM deve ser feita a partir de um
 * backend seguro (Cloud Functions), NÃO do frontend, para não expor
 * a Server Key. Esta implementação no frontend é para protótipo.
 *
 * ⚠️  ARCHITECTURE NOTE: This function should be moved to a Firebase
 * Cloud Function in production. The current implementation exposes the
 * FCM Server Key in the client-side code, which is a critical security
 * vulnerability. A Cloud Function callable would:
 *   1. Keep the Server Key in environment variables (never in client)
 *   2. Allow proper authentication/authorization checks
 *   3. Enable rate limiting and abuse prevention
 *   4. Support batch sending with topic subscriptions
 */
async function sendPushNotification(userId, title, body, data) {
    if (!userId || !title || !body) {
        console.warn("[FCM] Parâmetros inválidos para enviar notificação");
        return { success: false, error: 'Parâmetros inválidos' };
    }

    if (PUSH_SCRIPT_URL === 'SUA_URL_PUSH_SCRIPT_AQUI') {
        console.warn("[FCM] URL do Apps Script de push não configurada.");
        return { success: false, error: 'Push Script URL não configurada' };
    }

    try {
        // PASSO 1: Buscar o token FCM do destinatário no Firestore
        const userDoc = await fs.collection("users").doc(userId).get();
        if (!userDoc.exists) {
            console.warn("[FCM] Utilizador não encontrado:", userId);
            return { success: false, error: 'Utilizador não encontrado' };
        }

        const userData = userDoc.data();
        const targetToken = userData.fcmToken;

        if (!targetToken) {
            console.warn("[FCM] Utilizador não tem token FCM:", userId);
            return { success: false, error: 'Utilizador não activou notificações push' };
        }

        // PASSO 2: Enviar via Apps Script (FCM HTTP v1)
        const response = await fetch(PUSH_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
                acao: 'send_push',
                fcmToken: targetToken,
                title: title,
                body: body,
                extraData: { ...data, timestamp: Date.now().toString(), source: 'distro-angola' }
            })
        });

        const result = await response.json();

        if (result.success) {
            console.log("[FCM] Notificação enviada com sucesso para:", userId);
            try {
                await fs.collection("pushNotificationHistory").add({
                    userId: userId,
                    title: title,
                    body: body,
                    data: data || {},
                    fcmToken: targetToken.substring(0, 20) + '...',
                    success: true,
                    sentAt: firebase.firestore.FieldValue.serverTimestamp(),
                    sentBy: currentUser ? currentUser.uid : 'system'
                });
            } catch (logErr) { console.warn("[FCM] Erro ao registar histórico:", logErr); }
            return { success: true };
        } else {
            console.error("[FCM] Erro no envio:", result.error);
            return { success: false, error: result.error };
        }

    } catch (e) {
        console.error("[FCM] Erro ao enviar notificação push:", e);
        return { success: false, error: e.message };
    }
}

/**
 * Enviar Notificação Push a TODOS os utilizadores (broadcast)
 *
 * Busca todos os tokens FCM registados no Firestore e envia
 * notificações em lote. Para grandes volumes, usar Cloud Functions
 * com topic subscriptions.
 */
// [ADMIN] Enviar notificação push a todos os utilizadores (broadcast)
async function sendPushNotificationToAll(title, body, data) {
    if (!isAdmin) {
        console.warn("[FCM] Apenas admin pode enviar broadcast");
        return { success: false, error: 'Acesso negado' };
    }

    try {
        // Buscar todos os utilizadores com token FCM
        const usersSnap = await fs.collection("users")
            .where("fcmToken", ">", "")
            .limit(100) // Limitar para não sobrecarregar
            .get();

        if (usersSnap.empty) {
            return { success: false, error: 'Nenhum utilizador com notificações push activas' };
        }

        const tokens = [];
        const userIds = [];
        usersSnap.docs.forEach(doc => {
            const d = doc.data();
            if (d.fcmToken) {
                tokens.push(d.fcmToken);
                userIds.push(doc.id);
            }
        });

        if (!tokens.length) {
            return { success: false, error: 'Nenhum token FCM encontrado' };
        }

        // Enviar todos os tokens via Apps Script (FCM HTTP v1)
        const response = await fetch(PUSH_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
                acao: 'send_push_all',
                tokens: tokens,
                title: title,
                body: body,
                extraData: { ...data, source: 'distro-angola-broadcast', timestamp: Date.now().toString() }
            })
        });

        const result = await response.json();

        // Registar broadcast no histórico
        await addAdminLog("push_broadcast", "ALL", "Broadcast: " + title + " (Sucesso: " + (result.results?.success || 0) + "/" + tokens.length + ")");

        return {
            success: true,
            total: tokens.length,
            succeeded: result.results?.success || 0,
            failed: result.results?.failed || 0
        };

    } catch (e) {
        console.error("[FCM] Erro no broadcast:", e);
        return { success: false, error: e.message };
    }
}

/** Utilizador responde a uma mensagem */
// [USER] Utilizador responde a uma mensagem
async function replyToMessage(msgId, text) {
    if (!fs || !currentUser || !msgId || !text) return;
    try {
        const msgRef = fs.collection("users").doc(currentUser.uid).collection("messages").doc(msgId);
        const msgDoc = await msgRef.get();
        if (!msgDoc.exists) throw new Error("Mensagem nao encontrada");
        const msgData = msgDoc.data();
        const replies = msgData.replies || [];
        replies.push({ text: text, sender: "user", timestamp: new Date().toISOString() });
        await msgRef.update({ replies: replies, status: "open" });
        // Atualizar também na coleção global se existir
        try {
            const globalSnap = await fs.collection("globalMessages").where("userId", "==", currentUser.uid).where("originalMsgId", "==", msgId).limit(1).get();
            if (!globalSnap.empty) {
                await globalSnap.docs[0].ref.update({ replies: replies, status: "open" });
            }
        } catch (e) { console.warn("Erro ao atualizar globalMessage:", e); }
        // Notificar admin
        await enviarEmail("Resposta a mensagem", "Utilizador: " + (userProfile?.artisticName || currentUser.email) + "\nAssunto: " + (msgData.title || "N/A") + "\nResposta: " + text);
        await loadUserMessages();
        render();
    } catch (e) { console.error("Reply to message error:", e); throw e; }
}
