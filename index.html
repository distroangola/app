        '</div>';

        configHtml += '<div class="push-permission-box">' +
            '<span class="perm-icon">' + (vapidConfigured ? '✅' : '⚠️') + '</span>' +
            '<div class="perm-text">' +
                '<h6>VAPID Key</h6>' +
                '<p>' + (vapidConfigured ? 'Configurada' : 'Nao configurada - Obtenha em Firebase Console > Project Settings > Cloud Messaging') + '</p>' +
            '</div>' +
        '</div>';

        configHtml += '<div class="push-permission-box">' +
            '<span class="perm-icon">' + (serverConfigured ? '✅' : '⚠️') + '</span>' +
            '<div class="perm-text">' +
                '<h6>Server Key (FCM)</h6>' +
                '<p>' + (serverConfigured ? 'Configurada' : 'Nao configurada - Obtenha em Firebase Console > Project Settings > Cloud Messaging') + '</p>' +
            '</div>' +
        '</div>';

        configHtml += '<div class="push-permission-box">' +
            '<span class="perm-icon">' + (swSupported ? '✅' : '❌') + '</span>' +
            '<div class="perm-text">' +
                '<h6>Service Worker (sw.js)</h6>' +
                '<p>' + (swSupported ? 'Suportado pelo browser — PWA + FCM consolidado' : 'Nao suportado - As notificacoes push e cache offline nao funcionarao') + '</p>' +
            '</div>' +
        '</div>';

        if (!vapidConfigured || !serverConfigured) {
            configHtml += '<div class="info-box red mt-1">' +
                '<strong>Configuracao Incompleta!</strong><br>' +
                'Para que as notificacoes push funcionem, e necessario configurar a VAPID Key e a Server Key no codigo.<br>' +
                'Consulte as instrucoes no final desta tab ou a documentacao do projeto.' +
            '</div>';
        }

        if (vapidConfigured && serverConfigured) {
            configHtml += '<div class="info-box green mt-1">' +
                '<strong>Configuracao Completa!</strong> As notificacoes push estao prontas para uso.' +
            '</div>';
        }

        // PWA Status (informação sobre cache offline e instalação)
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        const isOnline = navigator.onLine;
        configHtml += '<div class="push-permission-box">' +
            '<span class="perm-icon">' + (isStandalone ? '📱' : '🌐') + '</span>' +
            '<div class="perm-text">' +
                '<h6>Modo PWA</h6>' +
                '<p>' + (isStandalone ? 'App instalada como PWA (standalone)' : 'A executar no browser — pode ser instalada no dispositivo') + '</p>' +
                '<p>Internet: <span class="push-status-badge ' + (isOnline ? 'push-status-granted' : 'push-status-denied') + '">' + (isOnline ? 'Online' : 'Offline') + '</span></p>' +
            '</div>' +
        '</div>';

        configDiv.innerHTML = configHtml;
    }

    // ============================================================
    // 2. Popular dropdown de destinatários
    // ============================================================
    const targetSelect = document.getElementById("pushTargetUser");
    if (targetSelect) {
        // Limpar opções anteriores exceto as 2 primeiras (Selecione + Todos)
        while (targetSelect.options.length > 2) targetSelect.remove(2);
        if (!adminUsersList.length) await loadAllUsersForAdmin();
        const approved = adminUsersList.filter(u => u.status === 'approved');
        approved.forEach(u => {
            const hasToken = !!u.fcmToken;
            const opt = document.createElement('option');
            opt.value = u.id;
            opt.textContent = (hasToken ? '🔔 ' : '🔕 ') + (u.artisticName || 'N/A') + ' (' + (u.email || '') + ')' + (hasToken ? '' : ' — sem push');
            if (!hasToken) opt.style.color = '#999';
            targetSelect.appendChild(opt);
        });

        // Aviso ao selecionar artista sem push
        targetSelect.addEventListener('change', function() {
            const selectedUid = this.value;
            if (!selectedUid || selectedUid === '__ALL__') return;
            const user = adminUsersList.find(u => u.id === selectedUid);
            if (user && !user.fcmToken) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Sem Push Activo',
                    text: (user.artisticName || 'Este artista') + ' ainda não activou as notificações push. A mensagem não será entregue.',
                    confirmButtonText: 'OK'
                });
            }
        });
    }

    // ============================================================
    // 3. Listar utilizadores com push activo
    // ============================================================
    const pushUsersDiv = document.getElementById("pushUsersList");
    if (pushUsersDiv) {
        try {
            if (!adminUsersList.length) await loadAllUsersForAdmin();
            const pushUsers = adminUsersList.filter(u => u.fcmToken && u.status === 'approved');

            if (!pushUsers.length) {
                pushUsersDiv.innerHTML = '<div class="info-box">Nenhum artista com notificacoes push activas ainda</div>';
            } else {
                let html = '';
                pushUsers.forEach(u => {
                    const tokenAge = u.fcmTokenUpdatedAt ? new Date(u.fcmTokenUpdatedAt._seconds ? u.fcmTokenUpdatedAt._seconds * 1000 : u.fcmTokenUpdatedAt).toLocaleDateString('pt-AO') : 'N/A';
                    html += '<div class="push-history-item">' +
                        '<strong>' + escapeHTML(u.artisticName || 'N/A') + '</strong> ' +
                        '<span style="color:var(--text-muted);font-size:0.75rem;">(' + escapeHTML(u.email || '') + ')</span><br>' +
                        '<span class="push-time">Token registado em: ' + tokenAge + '</span>' +
                    '</div>';
                });
                pushUsersDiv.innerHTML = html;
            }
        } catch (e) {
            pushUsersDiv.innerHTML = '<div class="info-box red">Erro ao carregar: ' + escapeHTML(e.message) + '</div>';
        }
    }

    // ============================================================
    // 4. Carregar histórico de notificações push
    // ============================================================
    const pushHistoryDiv = document.getElementById("pushHistoryList");
    if (pushHistoryDiv) {
        try {
            const histSnap = await fs.collection("pushNotificationHistory")
                .orderBy("sentAt", "desc")
                .limit(30)
                .get();

            if (histSnap.empty) {
                pushHistoryDiv.innerHTML = '<div class="info-box">Nenhuma notificacao push enviada ainda</div>';
            } else {
                let html = '';
                histSnap.docs.forEach(doc => {
                    const h = doc.data();
                    const time = h.sentAt?.toDate ? h.sentAt.toDate().toLocaleString('pt-AO') : 'N/A';
                    const statusIcon = h.success ? '✅' : '❌';
                    html += '<div class="push-history-item">' +
                        statusIcon + ' <strong>' + escapeHTML(h.title || 'N/A') + '</strong><br>' +
                        '<span style="color:var(--text-muted);">' + escapeHTML((h.body || '').substring(0, 100)) + '</span><br>' +
                        '<span class="push-time">Para: ' + escapeHTML(h.userId ? h.userId.substring(0, 10) + '...' : 'N/A') + ' | ' + time + '</span>' +
                    '</div>';
                });
                pushHistoryDiv.innerHTML = html;
            }
        } catch (e) {
            // Fallback sem orderBy
            try {
                const histSnap = await fs.collection("pushNotificationHistory").limit(30).get();
                if (histSnap.empty) {
                    pushHistoryDiv.innerHTML = '<div class="info-box">Nenhuma notificacao push enviada ainda</div>';
                } else {
                    const items = histSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    items.sort((a, b) => {
                        const da = a.sentAt?.toDate ? a.sentAt.toDate() : new Date(0);
                        const db = b.sentAt?.toDate ? b.sentAt.toDate() : new Date(0);
                        return db - da;
                    });
                    let html = '';
                    items.forEach(h => {
                        const time = h.sentAt?.toDate ? h.sentAt.toDate().toLocaleString('pt-AO') : 'N/A';
                        const statusIcon = h.success ? '✅' : '❌';
                        html += '<div class="push-history-item">' +
                            statusIcon + ' <strong>' + escapeHTML(h.title || 'N/A') + '</strong><br>' +
                            '<span style="color:var(--text-muted);">' + escapeHTML((h.body || '').substring(0, 100)) + '</span><br>' +
                            '<span class="push-time">Para: ' + escapeHTML(h.userId ? h.userId.substring(0, 10) + '...' : 'N/A') + ' | ' + time + '</span>' +
                        '</div>';
                    });
                    pushHistoryDiv.innerHTML = html;
                }
            } catch (e2) {
                pushHistoryDiv.innerHTML = '<div class="info-box red">Erro ao carregar historico</div>';
            }
        }
    }

    // ============================================================
    // 5. Configurar botão de envio manual
    // ============================================================
    const sendBtn = document.getElementById("sendPushNotifBtn");
    if (sendBtn) {
        // Remover listener antigo para evitar duplicação
        const newBtn = sendBtn.cloneNode(true);
        sendBtn.parentNode.replaceChild(newBtn, sendBtn);

        newBtn.addEventListener("click", async () => {
            const target = document.getElementById("pushTargetUser")?.value;
            const title = document.getElementById("pushNotifTitle")?.value?.trim();
            const body = document.getElementById("pushNotifBody")?.value?.trim();
            const dataType = document.getElementById("pushNotifDataType")?.value || 'info';
            const resultDiv = document.getElementById("pushNotifResult");

            if (!target) return Swal.fire("Erro", "Selecione um destinatario", "error");
            if (!title) return Swal.fire("Erro", "Digite o titulo da notificacao", "error");
            if (!body) return Swal.fire("Erro", "Digite a mensagem da notificacao", "error");

            // Confirmar envio
            const isBroadcast = target === '__ALL__';
            const confirmText = isBroadcast
                ? 'Enviar notificacao push para TODOS os artistas?'
                : 'Enviar notificacao push para este artista?';

            const confirmed = await Swal.fire({
                title: "Confirmar Envio",
                text: confirmText,
                icon: "question",
                showCancelButton: true,
                confirmButtonText: "Sim, enviar",
                cancelButtonText: "Cancelar",
                confirmButtonColor: "#9b4dff"
            });

            if (!confirmed.isConfirmed) return;

            Swal.fire({ title: "Enviando...", allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            try {
                const data = { type: dataType, sentManually: true };

                let result;
                if (isBroadcast) {
                    result = await sendPushNotificationToAll(title, body, data);
                } else {
                    result = await sendPushNotification(target, title, body, data);
                }

                Swal.close();

                if (result.success) {
                    if (isBroadcast) {
                        Swal.fire("Sucesso!", "Notificacao enviada para " + result.succeeded + " de " + result.total + " artistas", "success");
                    } else {
                        Swal.fire("Sucesso!", "Notificacao push enviada com sucesso", "success");
                    }
                    // Limpar formulário
                    document.getElementById("pushNotifTitle").value = '';
                    document.getElementById("pushNotifBody").value = '';
                    // Recarregar histórico
                    loadAdminPushNotifTab();
                } else {
                    const errorMsg = result.error || 'Erro desconhecido';
                    if (typeof errorMsg === 'object') {
                        Swal.fire("Aviso", "A notificacao nao pode ser enviada. Verifique a configuracao FCM (VAPID Key e Server Key).", "warning");
                    } else {
                        Swal.fire("Aviso", "Nao foi possivel enviar: " + escapeHTML(String(errorMsg)), "warning");
                    }
                    if (resultDiv) resultDiv.innerHTML = '<div class="info-box red mt-1">Erro: ' + escapeHTML(String(errorMsg)) + '</div>';
                }
            } catch (e) {
                Swal.close();
                Swal.fire("Erro", "Falha ao enviar notificacao: " + e.message, "error");
            }
        });
    }
}

// ================================================================
// [SHARED] 41. PWA — Progressive Web App Initialization
// ================================================================
// Registo do Service Worker, deteção offline, prompt de instalação
// e verificação de atualizações do SW.
//
// O sw.js consolidado gere tanto o cache offline (PWA) como as
// notificações push (FCM). O antigo firebase-messaging-sw.js
// continua a existir mas não é mais registado automaticamente.
// ================================================================

/** Variáveis globais do PWA */
let pwaDeferredPrompt = null;       // Evento beforeinstallprompt
let pwaIsInstalled = false;         // Se a app já foi instalada
let swRegistrationPWA = null;       // Referência ao registo do SW

/**
 * Inicializar PWA:
 * 1. Registar o Service Worker (sw.js)
 * 2. Configurar deteção offline/online
 * 3. Configurar prompt de instalação
 * 4. Verificar se já está instalada
 */
// [SHARED] Inicializar PWA — Service Worker, offline, instalação
async function initPWA() {
    // 1. Registar o Service Worker
    if ('serviceWorker' in navigator) {
        try {
            // Tentar registar o sw.js (PWA + FCM consolidado)
            swRegistrationPWA = await navigator.serviceWorker.register('/sw.js');
            console.log("[PWA] Service Worker registado com sucesso");

            // Escutar atualizações do Service Worker
            swRegistrationPWA.addEventListener('updatefound', () => {
                const newWorker = swRegistrationPWA.installing;
                console.log("[PWA] Nova versão do Service Worker encontrada");

                newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        // Há uma nova versão disponível — mostrar banner
                        console.log("[PWA] Nova versão pronta para ativar");
                        showSWUpdateBanner();
                    }
                });
            });

            // Verificar se há uma atualização pendente a cada 30 minutos
            setInterval(() => {
                swRegistrationPWA?.update?.();
            }, 30 * 60 * 1000);

        } catch (err) {
            console.warn("[PWA] Erro ao registar Service Worker:", err);
            // Fallback: tentar caminho alternativo
            try {
                swRegistrationPWA = await navigator.serviceWorker.register('./sw.js');
                console.log("[PWA] Service Worker registado (caminho alternativo)");
            } catch (err2) {
                console.error("[PWA] Falha ao registar Service Worker:", err2);
            }
        }
    } else {
        console.warn("[PWA] Service Worker não suportado neste browser");
    }

    // 2. Deteção offline/online
    setupOfflineDetection();

    // 3. Configurar prompt de instalação
    setupInstallPrompt();

    // 4. Verificar se a app já está instalada
    checkIfInstalled();
}

/**
 * Configurar deteção de estado offline/online
 * Mostra/esconde o banner offline conforme o estado da ligação
 */
// [SHARED] Configurar deteção de estado offline/online
function setupOfflineDetection() {
    const offlineBanner = document.getElementById('offlineBanner');
    if (!offlineBanner) return;

    function updateOnlineStatus() {
        if (navigator.onLine) {
            offlineBanner.classList.remove('visible');
            console.log("[PWA] Ligação restaurada");
        } else {
            offlineBanner.classList.add('visible');
            console.log("[PWA] Sem ligação à internet");
        }
    }

    // Estado inicial
    updateOnlineStatus();

    // Escutar eventos de conectividade
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
}

/**
 * Configurar o prompt de instalação da PWA
 * Captura o evento beforeinstallprompt e mostra o banner personalizado
 */
// [SHARED] Configurar prompt de instalação PWA
function setupInstallPrompt() {
    // Capturar o evento beforeinstallprompt (antes do browser mostrar o seu prompt)
    window.addEventListener('beforeinstallprompt', (e) => {
        // Prevenir o prompt padrão do browser
        e.preventDefault();
        // Guardar o evento para usar mais tarde
        pwaDeferredPrompt = e;
        console.log("[PWA] Evento beforeinstallprompt capturado");

        // Mostrar o banner de instalação personalizado
        showInstallBanner();
    });

    // Botão "Instalar" no banner
    const installBtn = document.getElementById('pwaInstallBtn');
    if (installBtn) {
        installBtn.addEventListener('click', async () => {
            if (!pwaDeferredPrompt) {
                console.warn("[PWA] Nenhum prompt de instalação disponível");
                return;
            }

            // Mostrar o prompt de instalação
            pwaDeferredPrompt.prompt();

            // Esperar pela resposta do utilizador
            const { outcome } = await pwaDeferredPrompt.userChoice;
            console.log("[PWA] Resposta do utilizador:", outcome);

            if (outcome === 'accepted') {
                console.log("[PWA] App instalada com sucesso!");
                pwaIsInstalled = true;
            }

            // Limpar a referência (só pode ser usado uma vez)
            pwaDeferredPrompt = null;
            hideInstallBanner();
        });
    }

    // Botão "Agora não" no banner
    const dismissBtn = document.getElementById('pwaDismissBtn');
    if (dismissBtn) {
        dismissBtn.addEventListener('click', () => {
            hideInstallBanner();
            // Não mostrar novamente durante esta sessão
            console.log("[PWA] Instalação adiada pelo utilizador");
        });
    }

    // Escutar evento de instalação concluída
    window.addEventListener('appinstalled', () => {
        console.log("[PWA] App instalada com sucesso (evento appinstalled)");
        pwaIsInstalled = true;
        hideInstallBanner();
    });
}

/**
 * Mostrar/esconder o banner de instalação
 */
// [SHARED] Mostrar banner de instalação PWA
function showInstallBanner() {
    const banner = document.getElementById('pwaInstallBanner');
    if (banner && !pwaIsInstalled) {
        banner.classList.add('visible');
    }
}

// [SHARED] Esconder banner de instalação PWA
function hideInstallBanner() {
    const banner = document.getElementById('pwaInstallBanner');
    if (banner) banner.classList.remove('visible');
}

/**
 * Verificar se a app já está instalada (standalone mode)
 */
// [SHARED] Verificar se a app já está instalada
function checkIfInstalled() {
    // Verificar se está em modo standalone
    if (window.matchMedia('(display-mode: standalone)').matches ||
        window.matchMedia('(display-mode: fullscreen)').matches ||
        window.navigator.standalone === true) {
        pwaIsInstalled = true;
        console.log("[PWA] App já está instalada (modo standalone detectado)");
        hideInstallBanner();
    }

    // Escutar mudanças no display-mode
    window.matchMedia('(display-mode: standalone)').addEventListener('change', (e) => {
        if (e.matches) {
            pwaIsInstalled = true;
            hideInstallBanner();
            console.log("[PWA] App agora em modo standalone");
        }
    });
}

/**
 * Mostrar banner de atualização do Service Worker
 * Quando uma nova versão do SW é encontrada, o utilizador pode
 * atualizar imediatamente sem fechar todos os tabs
 */
// [SHARED] Mostrar banner de atualização do Service Worker
function showSWUpdateBanner() {
    const banner = document.getElementById('swUpdateBanner');
    if (!banner) return;
    banner.classList.add('visible');

    const updateBtn = document.getElementById('swUpdateBtn');
    if (updateBtn) {
        // Remover listener antigo
        const newBtn = updateBtn.cloneNode(true);
        updateBtn.parentNode.replaceChild(newBtn, updateBtn);

        newBtn.addEventListener('click', () => {
            // Enviar mensagem ao SW para ativar a nova versão
            if (swRegistrationPWA?.waiting) {
                swRegistrationPWA.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            banner.classList.remove('visible');

            // Recarregar a página após o novo SW tomar controle
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
            });
        });
    }
}

// Inicializar PWA quando o DOM estiver pronto
initPWA();

// Render inicial
render();
</script>
